<script>
(function () {
  const root = document.documentElement;
  const coarse = matchMedia('(pointer: coarse)').matches;
  const noHover = matchMedia('(hover: none)').matches;
  const w = window.innerWidth;
  const h = window.innerHeight;
  const touch = (coarse && (w <= 1024 || h <= 520)) || (noHover && w <= 900);
  root.dataset.layout = touch ? 'touch' : 'wide';
  if (touch) {
    try {
      const saved = localStorage.getItem('ataraxia_scene')
        || localStorage.getItem('ataraxia_focus_scene')
        || 'timer';
      root.dataset.scene = saved === 'quote' ? 'quote' : 'timer';
    } catch (e) {
      root.dataset.scene = 'timer';
    }
  }
})();
</script>

  </div>

    <button class="phase-chip" id="chip-long">Long Break</button>
