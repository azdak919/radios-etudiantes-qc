name: Discover & Maintain News Sources

on:
  schedule:
    # Sporadic: once a week, Monday 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:   # Allow manual trigger

concurrency:
  group: discover-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Health-check feeds + probe candidates
        run: node scripts/discover-news-sources.js --update
        env:
          CI: true

      - name: Rebuild news feed (reflect any promotions / dead feeds)
        run: node scripts/fetch-news.js --update
        env:
          CI: true
          FIREBASE_POLYSCOPE_API_KEY: ${{ secrets.FIREBASE_POLYSCOPE_API_KEY }}

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet news-sources.json news.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "RÉQ News Bot"
          git config user.email "actions@users.noreply.github.com"
          git add news-sources.json news.json
          git commit -m "bot: maintain news sources + refresh feed (auto)"
          # Fichiers générés : en cas de conflit avec un commit concurrent,
          # -X theirs garde la version fraîchement produite par ce bot, et un
          # rebase interrompu est abandonné avant la tentative suivante —
          # sinon les retries échouent tous sur « unmerged files ».
          for i in 1 2 3; do
            git pull --rebase -X theirs --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i failed, retrying…"
            sleep $((i * 3))
          done
          echo "::error::could not push bot update after retries"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
