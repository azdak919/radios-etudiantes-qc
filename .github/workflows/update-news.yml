name: Update Student News

on:
  schedule:
    # Seven times a day. Cron is UTC; times below are Québec local (EDT, UTC-4).
    # In winter (EST, UTC-5) each slot lands ~1 h earlier locally.
    #   05:00 → early morning   (09:00 UTC)
    #   07:00 → morning         (11:00 UTC)
    #   10:00 → mid-morning     (14:00 UTC)
    #   12:00 → noon            (16:00 UTC)
    #   14:00 → afternoon       (18:00 UTC)
    #   19:00 → early night     (23:00 UTC)
    #   23:00 → late night      (03:00 UTC, next day)
    - cron: '0 3,9,11,14,16,18,23 * * *'
  workflow_dispatch:   # Allow manual trigger

# Never run two news-update jobs against the same ref at once.
concurrency:
  group: update-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and aggregate student-media RSS feeds
        run: |
          node scripts/fetch-news.js --update
          node scripts/verify-authors.js --update
          node scripts/enrich-lead-excerpts.js --update
          node scripts/ensure-lead-images.js --update
          node scripts/fetch-social.js --update
        env:
          CI: true

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet news.json author-qc.json lead-excerpt-qc.json social-feed.json lead-image-qc.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "RÉQ News Bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json author-qc.json lead-excerpt-qc.json social-feed.json lead-image-qc.json
          git commit -m "bot: update student news feed, lead excerpts, images QC and social (auto)"
          # Rebase onto any work pushed since checkout so the bot never
          # clobbers manual commits and never fails on a fast-forward race.
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            echo "push attempt $i failed, retrying…"
            sleep $((i * 3))
          done
          echo "::error::could not push bot update after retries"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
