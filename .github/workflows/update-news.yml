name: Update Student News

on:
  schedule:
    # Huit passes/jour alignées sur la consommation d'actualité (Québec).
    # Cron en UTC ; heures locales ci-dessous en été (EDT, UTC−4).
    # En hiver (EST, UTC−5), chaque passage arrive ~1 h plus tôt localement.
    #   05:30 → lève-tôt, avant le pic du matin         (09:30 UTC)
    #   07:00 → réveil, transport, premier check       (11:00 UTC)
    #   10:00 → entre les cours du matin                 (14:00 UTC)
    #   12:00 → pause dîner                              (16:00 UTC)
    #   13:30 → fin de dîner, retour en classe           (17:30 UTC)
    #   16:00 → fin de classes / retour                  (20:00 UTC)
    #   19:00 → soirée, retour à la maison               (23:00 UTC)
    #   21:00 → dernière passe avant la nuit             (01:00 UTC, lendemain)
    - cron: '0 1,11,14,16,20,23 * * *'
    - cron: '30 9,17 * * *'
  workflow_dispatch:   # Allow manual trigger

# Never run two news-update jobs against the same ref at once.
concurrency:
  group: update-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and aggregate student-media RSS feeds
        run: |
          node scripts/fetch-news.js --update
          node scripts/verify-authors.js --update
          node scripts/enrich-lead-excerpts.js --update
          node scripts/ensure-lead-images.js --update
          node scripts/verify-photo-credits.js --update
          node scripts/fetch-social.js --update
          node scripts/generate-feed.js --update
        env:
          CI: true
          FIREBASE_POLYSCOPE_API_KEY: ${{ secrets.FIREBASE_POLYSCOPE_API_KEY }}

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet news.json author-qc.json lead-excerpt-qc.json social-feed.json lead-image-qc.json photo-credit-qc.json feed.xml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "RÉQ News Bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json author-qc.json lead-excerpt-qc.json social-feed.json lead-image-qc.json photo-credit-qc.json feed.xml
          git commit -m "bot: update student news feed, excerpts, images, photo credits, RSS and social (auto)"
          # Rebase onto any work pushed since checkout so the bot never
          # clobbers manual commits and never fails on a fast-forward race.
          # Fichiers générés : en cas de conflit avec un commit concurrent,
          # -X theirs garde la version fraîchement produite par ce bot, et un
          # rebase interrompu est abandonné avant la tentative suivante —
          # sinon les retries échouent tous sur « unmerged files ».
          for i in 1 2 3; do
            git pull --rebase -X theirs --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i failed, retrying…"
            sleep $((i * 3))
          done
          echo "::error::could not push bot update after retries"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
