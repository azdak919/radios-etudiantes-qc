name: Update Student News

on:
  schedule:
    # Passes cibles (Québec). Cron en UTC — heures locales en été (EDT, UTC−4) :
    #   05:30 → 09:30 UTC   |  07:00 → 11:00 UTC  |  10:00 → 14:00 UTC
    #   12:00 → 16:00 UTC   |  13:30 → 17:30 UTC  |  16:00 → 20:00 UTC
    #   19:00 → 23:00 UTC   |  21:00 → 01:00 UTC (lendemain)
    #
    # GitHub Actions peut retarder ou SAUTER des crons épars (charge, file d'attente).
    # Filet : toutes les heures à :20 — ne s'exécute que si la dernière passe
    # date de plus de 75 min (compense un 13h30 jamais parti, etc.).
    - cron: '0 1,11,14,16,20,23 * * *'
    - cron: '30 9,17 * * *'
    - cron: '20 * * * *'
  workflow_dispatch:   # Allow manual trigger

# Un seul job à la fois ; annuler le précédent s'il est encore en train de
# tourner (évite les files de 40 min bloquées sur un fetch qui ne finit pas).
concurrency:
  group: update-news-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aggregate:
    runs-on: ubuntu-latest
    # 25 min suffit avec plafonds par source ; 45 min laissait un hang McGill
    # Daily bloquer toute l'après-midi.
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 déprécié sur les runners GitHub Actions (forçage vers 24).
          node-version: '24'

      # github.event.schedule = expression cron exacte qui a déclenché le run.
      # Filet :20 — skip si un refresh a déjà eu lieu récemment.
      - name: Safety-net gate
        id: gate
        run: |
          SCHEDULE='${{ github.event.schedule }}'
          echo "schedule=$SCHEDULE"
          if [ "$SCHEDULE" != "20 * * * *" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Primary or manual schedule — always run."
            exit 0
          fi
          AGE_MIN=$(node -e "
            const fs = require('fs');
            let updated = 0;
            try {
              const n = JSON.parse(fs.readFileSync('news.json', 'utf8'));
              updated = Date.parse(n.updated || 0) || 0;
            } catch { /* missing */ }
            console.log(Math.floor((Date.now() - updated) / 60000));
          ")
          echo "minutes_since_update=$AGE_MIN"
          if [ "$AGE_MIN" -lt 75 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Safety net: last update ${AGE_MIN}m ago (< 75m) — skip."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Safety net: last update ${AGE_MIN}m ago — run catch-up."
          fi

      # Chaque étape a un plafond : un script qui se fige n'empêche pas
      # d'écrire au moins news.json si fetch-news a réussi.
      - name: Fetch news feeds
        id: fetch
        if: steps.gate.outputs.skip != 'true'
        # Sources ~15s + enrich plafonné ~90s ; 12 min laissait un hang regex
        # tuer tout le job. Filet 10 min suffisant avec plafonds CI.
        timeout-minutes: 10
        run: node scripts/fetch-news.js --update
        env:
          CI: true
          FIREBASE_POLYSCOPE_API_KEY: ${{ secrets.FIREBASE_POLYSCOPE_API_KEY }}
        continue-on-error: false

      - name: Verify authors
        if: steps.gate.outputs.skip != 'true' && steps.fetch.outcome == 'success'
        timeout-minutes: 5
        run: node scripts/verify-authors.js --update
        env:
          CI: true
        continue-on-error: true

      - name: Enrich lead excerpts
        if: steps.gate.outputs.skip != 'true' && steps.fetch.outcome == 'success'
        timeout-minutes: 4
        run: node scripts/enrich-lead-excerpts.js --update
        env:
          CI: true
        continue-on-error: true

      - name: Ensure lead images
        if: steps.gate.outputs.skip != 'true' && steps.fetch.outcome == 'success'
        timeout-minutes: 6
        run: node scripts/ensure-lead-images.js --update
        env:
          CI: true
        continue-on-error: true

      - name: Verify photo credits
        if: steps.gate.outputs.skip != 'true' && steps.fetch.outcome == 'success'
        timeout-minutes: 5
        run: node scripts/verify-photo-credits.js --update
        env:
          CI: true
        continue-on-error: true

      - name: Fetch social + generate RSS
        if: steps.gate.outputs.skip != 'true' && steps.fetch.outcome == 'success'
        timeout-minutes: 4
        run: |
          node scripts/fetch-social.js --update
          node scripts/generate-feed.js --update
        env:
          CI: true
        continue-on-error: true

      # Toujours committer si news.json a bougé (même sans nouveaux articles) :
      # le timestamp « mis à jour » doit avancer après une passe réussie.
      - name: Check for changes
        id: check
        if: steps.gate.outputs.skip != 'true' && steps.fetch.outcome == 'success'
        run: |
          if git diff --quiet news.json author-qc.json lead-excerpt-qc.json social-feed.json lead-image-qc.json photo-credit-qc.json feed.xml news-sources.json 2>/dev/null; then
            # Forcer un heartbeat : réécrire updated si rien n'a changé
            # mais la passe a réussi (évite un libellé figé toute la journée).
            node -e "
              const fs = require('fs');
              const p = 'news.json';
              const n = JSON.parse(fs.readFileSync(p, 'utf8'));
              n.updated = new Date().toISOString();
              // Hors créneau planifié : pas de faux updatedSlot
              if (n.updatedSlot) {
                const slot = Date.parse(n.updatedSlot);
                const act = Date.parse(n.updated);
                if (!Number.isFinite(slot) || act - slot > 45 * 60 * 1000) delete n.updatedSlot;
              }
              fs.writeFileSync(p, JSON.stringify(n, null, 2) + '\n');
              console.log('heartbeat updated', n.updated);
            "
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.gate.outputs.skip != 'true' && steps.fetch.outcome == 'success' && steps.check.outputs.changed == 'true'
        run: |
          git config user.name "RÉQ News Bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json author-qc.json lead-excerpt-qc.json social-feed.json lead-image-qc.json photo-credit-qc.json feed.xml news-sources.json 2>/dev/null || true
          git commit -m "bot: update student news feed, excerpts, images, photo credits, RSS and social (auto)" || exit 0
          for i in 1 2 3; do
            git pull --rebase -X theirs --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i failed, retrying…"
            sleep $((i * 3))
          done
          echo "::error::could not push bot update after retries"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
