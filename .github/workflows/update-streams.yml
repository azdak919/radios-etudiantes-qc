name: Update Radio Streams

on:
  schedule:
    # Run every day at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:   # Allow manual trigger

# Never run two stream-update jobs against the same ref at once.
concurrency:
  group: update-streams-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    # Le sondage des flux prend ~15 min ; borne contre les exécutions zombies.
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Discover and validate streams
        run: |
          node scripts/discover-streams.js --update
        env:
          CI: true

      - name: Fetch now-playing metadata
        run: node scripts/fetch-radio-nowplaying.js --update

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet radios.json radios-candidates.json radio-nowplaying.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "RÉQ Stream Bot"
          git config user.email "actions@users.noreply.github.com"
          git add radios.json radios-candidates.json radio-nowplaying.json
          git commit -m "bot: update discovered streams (auto)"
          # Rebase onto any work pushed since checkout so the bot never
          # clobbers manual commits and never fails on a fast-forward race.
          # Fichiers générés : en cas de conflit avec un commit concurrent,
          # -X theirs garde la version fraîchement produite par ce bot, et un
          # rebase interrompu est abandonné avant la tentative suivante —
          # sinon les retries échouent tous sur « unmerged files ».
          for i in 1 2 3; do
            git pull --rebase -X theirs --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i failed, retrying…"
            sleep $((i * 3))
          done
          echo "::error::could not push bot update after retries"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}