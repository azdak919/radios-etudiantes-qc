name: Update Radio Now Playing

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: update-radio-nowplaying-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch stream now-playing metadata
        run: node scripts/fetch-radio-nowplaying.js --update

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet radio-nowplaying.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "RADAR Now Playing Bot"
          git config user.email "actions@users.noreply.github.com"
          git add radio-nowplaying.json
          git commit -m "bot: update radio now-playing metadata (auto)"
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            echo "push attempt $i failed, retrying…"
            sleep $((i * 3))
          done
          echo "::error::could not push now-playing update after retries"
          exit 1