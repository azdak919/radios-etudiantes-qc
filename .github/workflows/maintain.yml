name: Weekly Maintenance (full pipeline)

on:
  schedule:
    # Monday 08:00 UTC — after daily stream check, before news discovery
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: maintain-${{ github.ref }}
  cancel-in-progress: false

jobs:
  maintain:
    runs-on: ubuntu-latest
    # Le pipeline complet prend ~27 min ; borne contre les exécutions zombies.
    timeout-minutes: 50
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run full maintenance pipeline
        id: pipeline
        run: node scripts/maintain.js --update
        continue-on-error: true

      - name: Check for file changes
        id: check
        run: |
          CHANGED=false
          for f in institutions.json news-sources.json news.json radios.json radios-candidates.json radio-nowplaying.json bot-status.json feed.xml; do
            # git status voit aussi les fichiers pas encore suivis (bot-status.json
            # à sa première écriture), contrairement à git diff.
            if [ -n "$(git status --porcelain -- "$f")" ]; then
              CHANGED=true
              echo "changed: $f"
            fi
          done
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Commit and push bot updates
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "RADAR Maintenance Bot"
          git config user.email "actions@users.noreply.github.com"
          # N'ajouter que les fichiers présents : si le pipeline a échoué avant
          # d'écrire bot-status.json, git add sur un chemin absent est fatal et
          # les données déjà produites ne sont jamais poussées.
          for f in institutions.json news-sources.json news.json radios.json radios-candidates.json radio-nowplaying.json bot-status.json feed.xml; do
            [ -f "$f" ] && git add "$f"
          done
          git commit -m "bot: weekly maintenance run (auto)"
          # Fichiers générés : en cas de conflit avec un commit concurrent,
          # -X theirs garde la version fraîchement produite par ce bot, et un
          # rebase interrompu est abandonné avant la tentative suivante —
          # sinon les retries échouent tous sur « unmerged files ».
          for i in 1 2 3; do
            git pull --rebase -X theirs --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i failed, retrying…"
            sleep $((i * 3))
          done
          echo "::error::could not push maintenance update after retries"
          exit 1

      - name: Open GitHub issue when human attention needed
        if: steps.pipeline.outcome != 'success' && steps.pipeline.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # bot-status.json peut manquer si le pipeline a planté avant de
          # l'écrire — ouvrir quand même une issue minimale plutôt qu'échouer.
          if [ ! -f bot-status.json ]; then
            BODY="Le bot de maintenance hebdomadaire a échoué avant d'écrire bot-status.json — consulter les logs du run."
          else
          BODY=$(node -e "
            const s = require('./bot-status.json');
            const alerts = (s.alerts || []).map(a => '- [' + a.level + '] ' + a.message).join('\n');
            console.log('Le bot de maintenance hebdomadaire signale des points à vérifier.\n\n'
              + '**Résumé**\n'
              + '- Articles : ' + s.summary.news.articles + ' (' + s.summary.news.active + ' flux actifs)\n'
              + '- Radios avec flux : ' + s.summary.radios.withStream + '/' + s.summary.radios.listed + '\n'
              + '- Couverture journaux (univ.) : ' + s.summary.coverage.universitiesWithNews + '/' + s.summary.coverage.universitiesTotal + '\n\n'
              + '**Alertes**\n' + (alerts || '_aucune_'));
          ")
          fi
          gh issue list --repo "${{ github.repository }}" --search "in:title RADAR maintenance alert" --state open --json number --jq 'length' | {
            read OPEN
            if [ "$OPEN" -gt 0 ]; then
              echo "An open maintenance issue already exists — skipping."
              exit 0
            fi
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "RADAR maintenance alert — vérification humaine suggérée" \
              --body "$BODY"
          }