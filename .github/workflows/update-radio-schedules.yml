name: Update Radio Schedules

on:
  schedule:
    # Aux deux semaines (1er et 15 de chaque mois, 09:00 UTC) — les grilles
    # changent rarement, inutile de solliciter les sources plus souvent.
    - cron: '0 9 1,15 * *'
  workflow_dispatch:

concurrency:
  group: update-radio-schedules-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Discover and revalidate schedule sources
        run: node scripts/discover-schedule-sources.js --update

      - name: Collate station schedules
        run: node scripts/fetch-radio-schedules.js --update

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet radio-schedules.json radio-schedules.seed.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "RADAR Schedule Bot"
          git config user.email "actions@users.noreply.github.com"
          git add radio-schedules.json radio-schedules.seed.json
          git commit -m "bot: update radio schedules + sources (auto)"
          # Fichiers générés : en cas de conflit avec un commit concurrent,
          # -X theirs garde la version fraîchement produite par ce bot, et un
          # rebase interrompu est abandonné avant la tentative suivante —
          # sinon les retries échouent tous sur « unmerged files ».
          for i in 1 2 3; do
            git pull --rebase -X theirs --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            git rebase --abort 2>/dev/null || true
            echo "push attempt $i failed, retrying…"
            sleep $((i * 3))
          done
          echo "::error::could not push schedule update after retries"
          exit 1
