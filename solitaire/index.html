<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Solitaire</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'nonce-ataraxia-sol'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://images.unsplash.com https://images.pexels.com https://upload.wikimedia.org https://commons.wikimedia.org https://deckofcardsapi.com; connect-src 'self' https://api.mymemory.translated.net https://translate.googleapis.com https://libretranslate.com; frame-src 'self' https://le-radar.ca https://azdak919.github.io http://127.0.0.1:8888 http://localhost:8888; object-src 'none'; base-uri 'self'; form-action 'none'">

  <!-- Favicons — 🃏 Twemoji joker on dark tile (same pattern as Pomodoro 🍅) -->
  <link rel="icon" href="favicon.svg?v=2" type="image/svg+xml" sizes="any">
  <link rel="icon" href="favicon-32x32.png?v=2" sizes="32x32" type="image/png">
  <link rel="icon" href="favicon-96x96.png?v=2" sizes="96x96" type="image/png">
  <link rel="shortcut icon" href="favicon.ico?v=2">
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
  <meta name="apple-mobile-web-app-title" content="Solitaire">
  <meta name="application-name" content="Solitaire">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#8b6f4e" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1816" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../translate-menu.css">

  <style>
    /* ════════════════════════════════════════
       CSS VARIABLES — Ataraxia theme
       ════════════════════════════════════════ */
    :root {
      --font-body: 'Outfit', system-ui, sans-serif;

      /* Light theme */
      --bg-primary:      #f5f0eb;
      --bg-glass:        rgba(255, 255, 255, 0.55);
      --bg-glass-hover:  rgba(255, 255, 255, 0.72);
      --border-glass:    rgba(180, 170, 155, 0.3);
      --text-primary:    #2c2824;
      --text-secondary:  #6b6259;
      --text-muted:      #9a9088;
      --accent:          #8b6f4e;
      --accent-glow:     rgba(139, 111, 78, 0.18);
      --shadow-soft:     rgba(44, 40, 36, 0.06);
      --shadow-medium:   rgba(44, 40, 36, 0.12);
      --settings-bg:     rgba(252, 249, 246, 0.96);
      --settings-bg-solid: #fcf9f6;
      --settings-border: rgba(160, 148, 132, 0.45);

      /* Card colours */
      --card-face:           #ffffff;
      --card-back:           #4a6fa5;
      --card-back-2:         #3a5f95;
      --card-red:            #c0392b;
      --card-black:          #1a1a1a;
      --card-border:         rgba(120, 110, 100, 0.50);
      --card-shadow:         rgba(44, 40, 36, 0.20);
      --slot-bg:             rgba(139, 111, 78, 0.18);
      --slot-border:         rgba(139, 111, 78, 0.55);
      --selected-outline:    #8b6f4e;
      --selected-glow:       rgba(139, 111, 78, 0.35);

      /* Shared background overlay tint */
      --overlay: rgba(245, 240, 235, 0.35);

      /* Layout — card-w updated by JS */
      --card-w:    70px;
      --card-h:    98px;
      --col-gap:   8px;
      --board-pad: 12px;
      --header-h:  56px;
      /* inset for .card-svg to prevent border-radius clipping corner labels */
      --card-svg-inset: 6px;

      /* Barres fixes — même largeur que game-toolbar */
      --chrome-gutter: 0.75rem;
      /* Largeur pour barre bureau + module « À l'antenne » (~280px) */
      --chrome-cap: 960px;
      --chrome-width: min(calc(100vw - var(--chrome-gutter)), var(--chrome-cap));
      --chrome-surface-bg: rgba(0, 0, 0, 0.22);
      --chrome-surface-border: rgba(255, 255, 255, 0.1);
      --chrome-surface-blur: blur(12px);
      --credits-max-width: var(--chrome-width);
      --credits-pad-y: 0.38rem;
      --credits-pad-x: 0.85rem;
      --credits-font-size: 0.6rem;
      --credits-gap: 0.1rem 0.4rem;
      --credits-bottom: max(0.65rem, env(safe-area-inset-bottom, 0px));
      --credits-opacity-visible: 0.78;
      --sol-toolbar-offset: calc(max(0.45rem, env(safe-area-inset-top, 0px)) + 8.75rem);
      /* Aligné sur le-radar embed.css --embed-bar-h (barre bureau 62px) */
      --radar-embed-slot-h: 62px;
      --credits-bar-offset: 0px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --overlay: rgba(26, 24, 22, 0.45);

        --bg-primary:     #1a1816;
        --bg-glass:       rgba(40, 36, 32, 0.65);
        --bg-glass-hover: rgba(50, 45, 40, 0.80);
        --border-glass:   rgba(100, 90, 78, 0.28);
        --text-primary:   #e8e0d8;
        --text-secondary: #a89e94;
        --text-muted:     #6b6259;
        --accent:         #c9a87c;
        --accent-glow:    rgba(201, 168, 124, 0.18);
        --shadow-soft:    rgba(0, 0, 0, 0.18);
        --shadow-medium:  rgba(0, 0, 0, 0.35);

        --card-face:         #f8f8f8;
        --card-back:         #3a5a8a;
        --card-back-2:       #2e4a7a;
        --card-red:          #e53935;
        --card-black:        #212121;
        --card-border:       rgba(80, 80, 80, 0.55);
        --card-shadow:       rgba(0, 0, 0, 0.35);
        --slot-bg:           rgba(201, 168, 124, 0.16);
        --slot-border:       rgba(201, 168, 124, 0.50);
        --selected-outline:  #c9a87c;
        --selected-glow:     rgba(201, 168, 124, 0.30);
        --settings-bg:       rgba(30, 27, 24, 0.97);
        --settings-bg-solid: #1e1b18;
        --settings-border:   rgba(100, 88, 72, 0.55);
      }
    }

    /* ════════════════════════════════════════
       RESET & BASE
       ════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: 16px; color-scheme: light dark; }

    /* ════════════════════════════════════════
       SHARED BACKGROUND — mirrors index.html
       ════════════════════════════════════════ */
    #bg-layer,
    #bg-layer-next {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    #bg-layer { opacity: 1; }
    #bg-layer-next {
      opacity: 0;
      transition: opacity 1.8s ease;
      will-change: opacity;
    }
    #bg-layer-next.loaded { opacity: 1; }

    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: var(--overlay);
    }

    .page-layout {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      padding-top: var(--sol-toolbar-offset);
    }

    html {
      overscroll-behavior: none;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    button, a { -webkit-tap-highlight-color: transparent; }

    /* ════════════════════════════════════════
       TOP TOOLBAR — pastille centrée (miroir Ataraxia)
       ════════════════════════════════════════ */
    .game-toolbar {
      --tb-font: 0.8rem;
      --tb-sub-font: 0.7rem;
      --tb-ls: 0.03em;
      position: fixed;
      top: max(0.45rem, env(safe-area-inset-top, 0px));
      left: 0;
      right: 0;
      margin-inline: auto;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      padding: 0.42rem 0.62rem 0.34rem;
      width: var(--chrome-width);
      max-width: var(--chrome-width);
      box-sizing: border-box;
      border-radius: 20px;
      background: var(--chrome-surface-bg);
      border: 1px solid var(--chrome-surface-border);
      backdrop-filter: var(--chrome-surface-blur);
      -webkit-backdrop-filter: var(--chrome-surface-blur);
      overflow: visible;
    }

    /* Haut : même structure que Pomodoro — Home | liens | langue */
    .game-toolbar-chrome {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 0.15rem;
      position: relative;
      z-index: 1;
    }

    .game-toolbar-divider {
      width: 1px;
      height: 1.25rem;
      background: rgba(255, 255, 255, 0.14);
      flex-shrink: 0;
      margin: 0 0.08rem;
    }

    .game-toolbar-main {
      display: flex;
      flex: 1;
      min-width: 0;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.18rem;
    }

    /* Zone synthétiseur — barre bureau Le Radar (sans double cadre) */
    .game-toolbar-tuner {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.28rem;
      margin-bottom: 0;
      padding: 0.2rem 0.1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      min-height: calc(var(--radar-embed-slot-h) + 0.4rem);
      overflow: visible;
      position: relative;
      z-index: 3;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .radar-embed-frame {
      display: block;
      width: 100%;
      height: var(--radar-embed-slot-h);
      margin: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color-scheme: dark;
      overflow: hidden;
      vertical-align: middle;
      flex: 1 1 auto;
    }

    .radar-embed-frame.is-ready {
      opacity: 1;
    }

    /* Bas : contrôles et infos de partie */
    .game-toolbar-game {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.28rem 0.4rem;
      margin-top: 0.32rem;
      padding-top: 0;
      position: relative;
      z-index: 1;
    }

    .game-toolbar-game-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.18rem;
    }

    /* rétrocompat sélecteurs éventuels */
    .game-toolbar-sub { display: contents; }

    .toolbar-stats {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
      min-width: 11.5ch;
    }

    .toolbar-stat {
      font-family: var(--font-body);
      font-size: var(--tb-sub-font);
      font-weight: 400;
      letter-spacing: var(--tb-ls);
      line-height: 1.2;
      color: rgba(255, 255, 255, 0.62);
      white-space: nowrap;
    }

    .toolbar-stat-sep {
      font-size: var(--tb-sub-font);
      line-height: 1;
      color: rgba(255, 255, 255, 0.35);
      flex-shrink: 0;
    }

    .toolbar-stat--moves,
    .toolbar-stat--time {
      flex-shrink: 0;
    }

    #stat-moves {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      display: inline-block;
      min-width: 2ch;
      text-align: right;
    }

    #stat-time {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      display: inline-block;
      min-width: 5ch;
      text-align: center;
    }

    .toolbar-sub-sep {
      width: 1px;
      height: 0.85rem;
      background: rgba(255, 255, 255, 0.14);
      flex-shrink: 0;
    }

    .toolbar-links {
      display: inline-flex;
      align-items: center;
      gap: 0.12rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .toolbar-btn,
    .lang-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      font-family: var(--font-body);
      font-size: var(--tb-font);
      font-weight: 400;
      letter-spacing: var(--tb-ls);
      line-height: 1.2;
      padding: 0.42rem 0.72rem;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.72);
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .toolbar-btn:hover,
    .lang-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.95);
    }
    .toolbar-btn:active { transform: scale(0.96); }
    .toolbar-btn svg,
    .lang-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      opacity: 0.88;
      flex-shrink: 0;
    }
    /* Twemoji — même set que masthead Le Radar / toolbar Pomodoro */
    .app-emoji {
      display: block;
      width: 16px;
      height: 16px;
      object-fit: contain;
      flex-shrink: 0;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .toolbar-btn--home {
      padding: 0.42rem;
      gap: 0;
      flex-shrink: 0;
    }
    .toolbar-btn--sub {
      font-size: var(--tb-sub-font);
      padding: 0.24rem 0.52rem;
      color: rgba(255, 255, 255, 0.58);
    }
    .toolbar-btn--sub:hover { color: rgba(255, 255, 255, 0.88); }
    .toolbar-btn--sub svg {
      width: 13px;
      height: 13px;
    }
    .toolbar-btn:disabled {
      opacity: 0.32;
      cursor: default;
      pointer-events: none;
    }

    /* ════════════════════════════════════════
       LANGUAGE SELECTOR
       ════════════════════════════════════════ */
    .lang-selector {
      position: relative;
      flex-shrink: 0;
    }

    .lang-btn span { max-width: 6rem; overflow: hidden; text-overflow: ellipsis; }

    .lang-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--settings-bg-solid);
      border: 1px solid var(--settings-border);
      border-radius: 12px;
      padding: 0.35rem;
      min-width: 150px;
      max-height: 280px;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
      display: none;
      z-index: 600;
      isolation: isolate;
      -webkit-font-smoothing: antialiased;
    }
    .lang-dropdown.open { display: block; animation: fadeSlideIn 0.25s ease; }

    .lang-option {
      display: block;
      width: 100%;
      text-align: left;
      font-family: var(--font-body);
      font-size: 0.78rem;
      color: var(--text-primary);
      background: none;
      border: none;
      border-radius: 8px;
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .lang-option:hover { background: var(--accent-glow); }
    .lang-option.active { color: var(--accent); font-weight: 500; }

    .lang-translating {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: right;
      padding: 0.2rem 0;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      pointer-events: none;
    }
    .lang-translating.visible { opacity: 1; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ════════════════════════════════════════
       GAME BOARD
       ════════════════════════════════════════ */
    #game-board {
      max-width: 980px;
      margin: 0 auto;
      padding: var(--board-pad);
      padding-left:  max(var(--board-pad), env(safe-area-inset-left, 0px));
      padding-right: max(var(--board-pad), env(safe-area-inset-right, 0px));
      padding-bottom: max(
        calc(var(--card-h) * 0.4 + var(--board-pad) + var(--credits-bar-offset)),
        env(safe-area-inset-bottom, 0px)
      );
      display: flex;
      flex-direction: column;
      gap: var(--col-gap);
      min-height: calc(100dvh - var(--sol-toolbar-offset) - var(--credits-bar-offset));
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-y;
    }

    .top-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--col-gap);
    }

    .tableau-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--col-gap);
      align-items: start;
    }

    /* ════════════════════════════════════════
       CARD SLOT (empty placeholder / drop target)
       ════════════════════════════════════════ */
    .card-slot {
      width: 100%;
      height: var(--card-h);
      border-radius: clamp(4px, 6%, 9px);
      border: 2px solid var(--slot-border);
      background: var(--slot-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }

    .slot-label {
      font-size: clamp(1.1rem, calc(var(--card-w) * 0.30), 1.8rem);
      color: var(--slot-border);
      pointer-events: none;
      line-height: 1;
      font-weight: 600;
    }

    .drop-active .card-slot,
    .card-slot.drop-active {
      background: var(--accent-glow);
      border-color: var(--accent);
      border-style: solid;
    }

    /* ════════════════════════════════════════
       PILE WRAPPERS
       ════════════════════════════════════════ */
    .pile-wrapper {
      position: relative;
      width: 100%;
      height: var(--card-h);
    }

    .tableau-pile {
      position: relative;
      width: 100%;
    }

    .stock-wrapper { cursor: pointer; }

    /* ════════════════════════════════════════
       CARD
       ════════════════════════════════════════ */
    .card {
      position: absolute;
      width: 100%;
      height: var(--card-h);
      border-radius: clamp(4px, 6%, 9px);
      border: 1px solid var(--card-border);
      box-shadow: 0 2px 4px var(--card-shadow), 0 4px 10px var(--card-shadow);
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* ── Face-down ── */
    .card--back { cursor: default; }

    /* ── Face-up ── */
    .card--face {
      background: var(--card-face);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 4px 5px;
    }

    /* ── SVG card sprite art (fills entire card, inset var(--card-svg-inset) to avoid
          border-radius clipping the rank/suit corner labels) ── */
    .card-svg {
      position: absolute;
      inset: var(--card-svg-inset);
      pointer-events: none;
    }

    /* ── Fallback built-in art (used when API image unavailable) ── */
    .card--face.card--red   { color: var(--card-red); }
    .card--face.card--black { color: var(--card-black); }
    .card--face.card--local-art {
      padding: clamp(3px, calc(var(--card-w) * 0.05), 6px) clamp(3px, calc(var(--card-w) * 0.06), 7px);
      box-sizing: border-box;
    }
    .card-corner {
      display: flex; flex-direction: column; align-items: center;
      line-height: 1; gap: 0; position: relative; z-index: 2;
    }
    .card-corner--br { align-self: flex-end; transform: rotate(180deg); }
    .card-val      { font-size: clamp(11px, calc(var(--card-w) * 0.22), 18px); font-weight: 700; line-height: 1; }
    .card-suit-sm  { font-size: clamp(9px,  calc(var(--card-w) * 0.18), 14px); line-height: 1; }
    .card-face-art {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1; overflow: hidden;
    }
    .card-face-art svg,
    .card-back-art svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .card-back-art {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1; overflow: hidden;
    }

    /* ── Deck of Cards API images (primary look) ── */
    .card-api-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      border-radius: clamp(3px, 5%, 8px);
      display: block;
      /* Never show broken-image “alt” glyphs */
      color: transparent;
      font-size: 0;
    }

    /* ── Selected ── */
    .card--selected {
      box-shadow:
        0 0 0 2px var(--selected-outline),
        0 4px 16px var(--selected-glow) !important;
      transform: translateY(-4px);
      z-index: 200 !important;
    }

    /* ── Drag ghost ── */
    .card--dragging { opacity: 0.45; }

    /* ── Drop zone ── */
    .card.drop-active {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ════════════════════════════════════════
       WIN OVERLAY
       ════════════════════════════════════════ */
    #win-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      background: rgba(245, 240, 235, 0.88);
      backdrop-filter: blur(14px) saturate(1.2);
      -webkit-backdrop-filter: blur(14px) saturate(1.2);
      animation: overlayFadeIn 0.5s ease;
    }
    @media (prefers-color-scheme: dark) {
      #win-overlay { background: rgba(26, 24, 22, 0.88); }
    }
    #win-overlay.hidden { display: none; }

    @keyframes overlayFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .win-title {
      font-size: clamp(2.2rem, 8vw, 3.8rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      animation: winSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }
    .win-sub {
      font-size: 0.88rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      animation: winSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
    }
    @keyframes winSlideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: none; }
    }

    .win-btn {
      font-family: var(--font-body);
      font-size: 0.84rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.72rem 2.4rem;
      border-radius: 100px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.25s ease;
      animation: winSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
    }
    .win-btn:hover {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    /* ════════════════════════════════════════
       HI-SCORE — modal centré (viewport)
       inset+margin : pas de transform (évite conflit d’animation)
       ════════════════════════════════════════ */
    #hi-score-backdrop {
      position: fixed;
      inset: 0;
      z-index: 315;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      animation: overlayFadeIn 0.25s ease both;
    }
    #hi-score-backdrop.hidden { display: none; }

    #hi-score-panel {
      position: fixed;
      /* Vrai centre écran, indépendant du bouton ★ Scores */
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      margin: auto;
      z-index: 320;
      width: min(17.5rem, calc(100vw - 1.5rem));
      height: fit-content;
      max-height: min(70dvh, 28rem);
      overflow-y: auto;
      padding: 0.85rem 0.9rem 0.85rem;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(12, 11, 10, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: rgba(255, 248, 235, 0.92);
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
      animation: hiScoreIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes hiScoreIn {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to   { opacity: 1; transform: none; }
    }
    #hi-score-panel.hidden { display: none; }
    .hi-score-title {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #f0c14e;
      margin-bottom: 0.45rem;
    }
    .hi-score-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.18rem;
    }
    .hi-score-list li {
      display: grid;
      grid-template-columns: 1.1rem 2.4rem 1fr auto;
      gap: 0.35rem;
      align-items: baseline;
      color: rgba(255, 255, 255, 0.78);
      line-height: 1.35;
    }
    .hi-score-list li.is-new {
      color: #fff;
      text-shadow: 0 0 10px rgba(240, 193, 78, 0.45);
    }
    .hi-score-list .hi-rank { color: rgba(255, 255, 255, 0.4); }
    .hi-score-list .hi-name { font-weight: 700; letter-spacing: 0.12em; }
    .hi-score-list .hi-time { text-align: right; color: rgba(255, 255, 255, 0.72); }
    .hi-score-list .hi-moves {
      text-align: right;
      color: rgba(255, 255, 255, 0.42);
      font-size: 0.65rem;
      min-width: 2.6rem;
    }
    .hi-score-empty {
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      padding: 0.25rem 0 0.15rem;
    }
    .hi-score-entry {
      margin-top: 0.55rem;
      padding-top: 0.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }
    .hi-score-entry.hidden { display: none; }
    .hi-score-entry-label {
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #f0c14e;
      margin-bottom: 0.4rem;
    }
    .hi-score-letters {
      display: flex;
      justify-content: center;
      gap: 0.45rem;
      margin-bottom: 0.45rem;
    }
    .hi-letter-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }
    .hi-letter-spin {
      width: 1.65rem;
      height: 1.1rem;
      padding: 0;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.55rem;
      line-height: 1;
      cursor: pointer;
    }
    .hi-letter-spin:hover { color: #f0c14e; }
    .hi-letter {
      width: 1.85rem;
      height: 1.85rem;
      border: 1px solid rgba(240, 193, 78, 0.45);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0;
      cursor: pointer;
      line-height: 1;
    }
    .hi-letter:focus-visible {
      outline: 2px solid #f0c14e;
      outline-offset: 2px;
    }
    .hi-score-ok {
      font-family: inherit;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.38rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(240, 193, 78, 0.55);
      background: transparent;
      color: #f0c14e;
      cursor: pointer;
    }
    .hi-score-ok:hover {
      background: rgba(240, 193, 78, 0.15);
    }
    .hi-score-close {
      display: block;
      width: 100%;
      margin-top: 0.45rem;
      padding: 0.25rem;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.38);
      font-family: inherit;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .hi-score-close:hover { color: rgba(255, 255, 255, 0.7); }

    /* ════════════════════════════════════════
       CASCADE WIN ANIMATION
       ════════════════════════════════════════ */
    #cascade-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 250;
      overflow: hidden;
    }
    #cascade-container.active {
      pointer-events: all;
      cursor: pointer;
    }
    #cascade-hint {
      position: fixed;
      bottom: 2.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0.75;
      pointer-events: none;
      animation: winSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.2s both;
    }

    .cascade-card {
      position: fixed;
      width: var(--card-w);
      height: var(--card-h);
      border-radius: clamp(4px, 6%, 9px);
      border: 1px solid var(--card-border);
      background: var(--card-face);
      color: var(--card-black);
      box-shadow: 0 3px 10px var(--card-shadow);
      /* NO animation property - JS driven */
    }
    .cascade-card.cascade-red { color: var(--card-red); }
    .cascade-card .cc-rank {
      position: absolute;
      top: 3px;
      left: 5px;
      font-size: clamp(9px, calc(var(--card-w) * 0.22), 20px);
      font-weight: 700;
      line-height: 1;
    }
    .cascade-card .cc-suit-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(14px, calc(var(--card-w) * 0.44), 36px);
      line-height: 1;
    }
    /* confetti pieces */
    .confetti-piece {
      position: fixed;
      border-radius: 2px;
      opacity: 0.9;
      /* NO animation property - JS driven */
    }
    /* fireworks particles */
    .fw-particle {
      position: fixed;
      border-radius: 50%;
      /* NO animation property - JS driven */
    }

    /* ════════════════════════════════════════
       HINT HIGHLIGHT
       ════════════════════════════════════════ */
    .card--hint {
      animation: hint-pulse 0.7s ease-in-out infinite !important;
      box-shadow:
        0 0 0 3px #f5c518,
        0 0 0 6px rgba(245, 197, 24, 0.35),
        0 8px 22px rgba(245, 197, 24, 0.45) !important;
      z-index: 50 !important;
      filter: brightness(1.06);
    }
    .slot--hint {
      background: rgba(245, 197, 24, 0.28) !important;
      border-color: #f5c518 !important;
      box-shadow:
        0 0 0 3px #f5c518,
        0 0 0 6px rgba(245, 197, 24, 0.28),
        0 6px 16px rgba(245, 197, 24, 0.4) !important;
      animation: hint-slot-pulse 0.7s ease-in-out infinite !important;
    }
    .stock-wrapper.card--hint,
    .stock-wrapper.slot--hint {
      border-radius: clamp(4px, 6%, 9px);
      box-shadow:
        0 0 0 3px #f5c518,
        0 0 0 6px rgba(245, 197, 24, 0.3),
        0 6px 18px rgba(245, 197, 24, 0.4) !important;
      animation: hint-pulse 0.7s ease-in-out infinite !important;
    }
    @keyframes hint-pulse {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-5px) scale(1.03); }
    }
    @keyframes hint-slot-pulse {
      0%, 100% { background: rgba(245, 197, 24, 0.22); }
      50%       { background: rgba(245, 197, 24, 0.42); }
    }
    #hint-toast {
      position: fixed;
      left: 50%;
      bottom: max(4.5rem, calc(env(safe-area-inset-bottom, 0px) + 3.5rem));
      transform: translateX(-50%) translateY(8px);
      z-index: 280;
      max-width: min(22rem, calc(100vw - 1.5rem));
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      background: rgba(12, 11, 10, 0.88);
      border: 1px solid rgba(245, 197, 24, 0.45);
      color: rgba(255, 248, 235, 0.95);
      font-family: var(--font-body);
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    #hint-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ════════════════════════════════════════
       AUTO-COMPLETE BANNER
       ════════════════════════════════════════ */
    #autocomplete-banner {
      text-align: center;
      padding: 0.45rem 1rem;
      background: rgba(139,111,78,0.14);
      border-bottom: 1px solid rgba(139,111,78,0.28);
    }
    #autocomplete-banner.hidden { display: none; }
    #autocomplete-btn {
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.38rem 1.4rem;
      border-radius: 100px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #autocomplete-btn:hover { opacity: 0.85; }

    /* ════════════════════════════════════════
       NO MORE MOVES TOAST
       ════════════════════════════════════════ */
    #no-moves-toast {
      position: fixed;
      top: calc(var(--header-h) + 3.5rem);
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: var(--settings-bg);
      border: 1px solid var(--settings-border);
      border-radius: 12px;
      padding: 0.65rem 1.4rem;
      font-size: 0.82rem;
      color: var(--text-primary);
      letter-spacing: 0.06em;
      text-align: center;
      box-shadow: 0 4px 20px var(--shadow-medium);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 150;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      max-width: min(90vw, 32rem);
      overflow-wrap: break-word;
    }
    #no-moves-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ════════════════════════════════════════
       WIN STATS
       ════════════════════════════════════════ */
    .win-stats {
      display: flex;
      gap: 1.8rem;
      margin-bottom: 0.6rem;
      animation: winSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
    }
    .win-stat {
      text-align: center;
    }
    .win-stat-value {
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--accent);
      line-height: 1.2;
    }
    .win-stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ════════════════════════════════════════
       REDUCED MOTION (was after cascadeFall keyframes, now after cascade-card)
       ════════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ════════════════════════════════════════
       BOTTOM-RIGHT CREDITS BAR
       ════════════════════════════════════════ */
    .bottom-badges {
      position: fixed;
      left: 0;
      right: 0;
      margin-inline: auto;
      transform: none;
      bottom: var(--credits-bottom);
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: var(--credits-gap);
      width: var(--chrome-width);
      max-width: var(--chrome-width);
      box-sizing: border-box;
      opacity: 0;
      transition: background 0.3s ease, opacity 0.35s ease;
      z-index: 10;
      pointer-events: auto;
      font-family: var(--font-body);
      font-size: var(--credits-font-size);
      font-weight: 300;
      text-align: center;
      color: rgba(255, 255, 255, 0.75);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
      background: var(--chrome-surface-bg);
      padding: var(--credits-pad-y) var(--credits-pad-x);
      border-radius: 20px;
      border: 1px solid var(--chrome-surface-border);
      backdrop-filter: var(--chrome-surface-blur);
      -webkit-backdrop-filter: var(--chrome-surface-blur);
      letter-spacing: 0.02em;
    }
    @keyframes creditsEnter {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: var(--credits-opacity-visible); transform: translateY(0); }
    }
    .bottom-badges.visible {
      opacity: var(--credits-opacity-visible);
      animation: creditsEnter 0.52s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .bottom-badges:hover { opacity: 1; background: rgba(0, 0, 0, 0.36); }

    .bottom-badges .credits-divider { margin: 0 0.35rem; opacity: 0.4; }

    .img-credit {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 28rem;
      flex-shrink: 1;
      min-width: 0;
    }
    .img-credit a { color: rgba(255, 255, 255, 0.9); text-decoration: none; }
    .img-credit a:hover { text-decoration: underline; }

    .license-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: inherit;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
    }
    .license-badge:hover { color: rgba(255, 255, 255, 1); }

    .copyleft-symbol {
      font-size: 0.75rem;
      line-height: 1;
      flex-shrink: 0;
      opacity: 0.9;
      display: inline-block;
      transform: scaleX(-1);
    }

    /* ════════════════════════════════════════
       RESPONSIVE CREDITS — portrait (comme Ataraxia)
       ════════════════════════════════════════ */
    @media (orientation: portrait) {
      .bottom-badges .img-credit {
        flex-basis: 100%;
        text-align: center;
        white-space: normal;
        overflow: visible;
        text-overflow: unset;
        max-width: 100%;
      }
      .bottom-badges .img-credit + .credits-divider { display: none; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════ SHARED BACKGROUND ══════════════════════ -->
<div id="bg-layer"></div>
<div id="bg-layer-next"></div>
<div id="bg-overlay"></div>

<div class="page-layout">
<!-- ══════════════════════ TOP TOOLBAR ══════════════════════ -->
<nav class="game-toolbar" aria-label="Game controls">
  <!-- Haut : même pattern que Pomodoro — Home | Le Radar · Pomodoro · café | langue -->
  <div class="game-toolbar-chrome" aria-label="Navigation and extras">
    <button class="toolbar-btn toolbar-btn--home" id="home-reload-btn" type="button" aria-label="Reload page">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/></svg>
    </button>
    <div class="game-toolbar-divider" aria-hidden="true"></div>
    <div class="game-toolbar-main">
      <a class="toolbar-btn" id="radar-btn"
         href="../"
         aria-label="Le Radar — radios étudiantes du Québec">
        <img class="app-emoji" src="../assets/emoji/satellite.png" width="16" height="16" alt="" decoding="async" aria-hidden="true">
        <span id="radar-btn-label">Le Radar</span>
      </a>
      <a class="toolbar-btn" href="../pomo/" id="back-pomodoro-link" aria-label="Back to Pomodoro">
        <img class="app-emoji" src="../assets/emoji/tomato.png" width="16" height="16" alt="" decoding="async" aria-hidden="true">
        <span id="back-pomodoro-label">Pomodoro</span>
      </a>
      <a class="toolbar-btn" id="coffee-btn"
         href="https://www.buymeacoffee.com/azdak"
         target="_blank" rel="noopener noreferrer" aria-label="Buy me a coffee">
        <img class="app-emoji" src="../assets/emoji/coffee.png" width="16" height="16" alt="" decoding="async" aria-hidden="true">
        <span id="coffee-btn-label">Buy me a coffee</span>
      </a>
    </div>
    <div class="game-toolbar-divider" aria-hidden="true"></div>
    <div class="lang-selector translate-control radar-translate-control--app notranslate" id="translate-control" translate="no">
      <button class="lang-btn toolbar-btn translate-toggle" id="lang-btn" aria-label="Change language" aria-haspopup="listbox" aria-expanded="false" aria-controls="lang-dropdown" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
        <span id="lang-label" class="translate-toggle__label">Original</span>
        <svg class="translate-toggle__chev" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="lang-dropdown translate-menu" id="lang-dropdown" role="listbox" aria-label="Langue d’affichage" hidden></div>
      <div class="lang-translating" id="lang-status"></div>
    </div>
  </div>

  <!-- Centre : synthétiseur Le Radar (centré entre les filets) -->
  <div class="game-toolbar-tuner" id="game-toolbar-tuner">
    <iframe
      id="radar-embed"
      class="radar-embed-frame"
      src="../tuner-embed.html"
      title="Le Radar — syntoniseur radio"
      loading="eager"
      allow="autoplay; encrypted-media"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </div>

  <!-- Bas : actions et infos de jeu -->
  <div class="game-toolbar-game" aria-label="Game actions">
    <div class="game-toolbar-game-actions">
      <button class="toolbar-btn" id="undo-btn" aria-label="Undo last move" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/>
        </svg>
        <span id="undo-label">Undo</span>
      </button>
      <button class="toolbar-btn" id="new-game-btn" aria-label="Start new playable game" title="New playable deal">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
        <span id="new-game-label">New Game</span>
      </button>
      <button class="toolbar-btn" id="restart-deal-btn" aria-label="Restart this deal" title="Restart this deal" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        </svg>
        <span id="restart-deal-label">Restart deal</span>

/* ══════════════════════════════════════════════════════════
   CARD HELPERS
   ══════════════════════════════════════════════════════════ */
function numVal(v) {
  return VALUES.indexOf(v) + 1; // A=1 … K=13
}

function isRed(suit) {
  return suit === '♥' || suit === '♦';
}

function createDeck() {
  const deck = [];
  for (const suit of SUITS) {
    for (const val of VALUES) {
      deck.push({ suit, value: val, faceUp: false });
    }
  }
  return deck;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ══════════════════════════════════════════════════════════
   NEW GAME
   ══════════════════════════════════════════════════════════ */
function dealFromDeck(deck) {
  foundations = [[], [], [], []];
  tableau     = Array.from({ length: 7 }, () => []);
  waste       = [];
  let di = 0;
  for (let col = 0; col < 7; col++) {
    for (let row = 0; row <= col; row++) {
      const c = { ...deck[di++], faceUp: row === col };
      tableau[col].push(c);
    }
  }
  stock = deck.slice(di).map(c => ({ ...c, faceUp: false }));
}

function cloneCard(c) {
  return { suit: c.suit, value: c.value, faceUp: !!c.faceUp };
}

function cloneState(st) {
  return {
    stock: st.stock.map(cloneCard),
    waste: st.waste.map(cloneCard),
    foundations: st.foundations.map(f => f.map(cloneCard)),
    tableau: st.tableau.map(col => col.map(cloneCard)),
  };
}

function stateKey(st) {
  const enc = (c) => (c.faceUp ? '1' : '0') + c.suit + c.value;
  return [
    st.stock.map(enc).join(','),
    st.waste.map(enc).join(','),
    st.foundations.map(f => f.map(enc).join('.')).join('|'),
    st.tableau.map(col => col.map(enc).join('.')).join('|'),
  ].join(';');
}

function canDropOnFoundationState(card, fi, foundations) {
  const f = foundations[fi];
  if (f.length === 0) return card.value === 'A';
  const top = f[f.length - 1];
  return top.suit === card.suit && numVal(card.value) === numVal(top.value) + 1;
}

function canDropOnTableauState(card, col, tableau) {
  const pile = tableau[col];
  if (pile.length === 0) return card.value === 'K';
  const top = pile[pile.length - 1];
  if (!top.faceUp) return false;
  return isRed(top.suit) !== isRed(card.suit) &&
         numVal(card.value) === numVal(top.value) - 1;
}

function flipExposedState(st) {
  for (let col = 0; col < 7; col++) {
    const pile = st.tableau[col];
    if (pile.length > 0 && !pile[pile.length - 1].faceUp) {
      pile[pile.length - 1].faceUp = true;
    }
  }
}

/** Score a deal with greedy play: higher = more cards built + more face-ups revealed. */
function scoreDealGreedy(startState, maxSteps = 450) {
  let st = cloneState(startState);
  const seen = new Set();
  let bestFound = 0;
  let bestFaceUp = 0;
  let recycles = 0;

  for (let step = 0; step < maxSteps; step++) {
    const found = st.foundations.reduce((n, f) => n + f.length, 0);
    const faceUp = st.tableau.reduce((n, col) => n + col.filter(c => c.faceUp).length, 0)
      + st.waste.length;
    if (found > bestFound) bestFound = found;
    if (faceUp > bestFaceUp) bestFaceUp = faceUp;
    if (found === 52) break;

    const key = stateKey(st);
    if (seen.has(key)) break;
    seen.add(key);

    let moved = false;

    // Foundation from waste / tableau tops
    if (st.waste.length) {
      const card = st.waste[st.waste.length - 1];
      for (let fi = 0; fi < 4; fi++) {
        if (canDropOnFoundationState(card, fi, st.foundations)) {
          st.waste.pop(); st.foundations[fi].push(card); flipExposedState(st); moved = true; break;
        }
      }
    }
    if (!moved) {
      for (let col = 0; col < 7 && !moved; col++) {
        const pile = st.tableau[col];
        if (!pile.length || !pile[pile.length - 1].faceUp) continue;
        const card = pile[pile.length - 1];
        for (let fi = 0; fi < 4; fi++) {
          if (canDropOnFoundationState(card, fi, st.foundations)) {
            pile.pop(); st.foundations[fi].push(card); flipExposedState(st); moved = true; break;
          }
        }
      }
    }
    if (moved) continue;

    // Uncover face-down via tableau move
    outerUncover:
    for (let col = 0; col < 7; col++) {
      const pile = st.tableau[col];
      for (let ci = 0; ci < pile.length; ci++) {
        if (!pile[ci].faceUp) continue;
        if (!(ci > 0 && !pile[ci - 1].faceUp)) continue;
        const card = pile[ci];
        for (let tc = 0; tc < 7; tc++) {
          if (tc === col) continue;
          if (canDropOnTableauState(card, tc, st.tableau)) {
            const run = pile.splice(ci);
            st.tableau[tc].push(...run);
            flipExposedState(st);
            moved = true;
            break outerUncover;
          }
        }
      }
    }
    if (moved) continue;

    // Waste → tableau
    if (st.waste.length) {
      const card = st.waste[st.waste.length - 1];
      for (let tc = 0; tc < 7; tc++) {
        if (canDropOnTableauState(card, tc, st.tableau)) {
          st.waste.pop(); st.tableau[tc].push(card); flipExposedState(st); moved = true; break;
        }
      }
    }
    if (moved) continue;

    // Other tableau moves (skip lone king empty-empty cycles)
    outerTab:
    for (let col = 0; col < 7; col++) {
      const pile = st.tableau[col];
      for (let ci = 0; ci < pile.length; ci++) {
        if (!pile[ci].faceUp) continue;
        if (ci === 0 && pile[ci].value === 'K' && pile.length === 1) continue;
        const card = pile[ci];
        for (let tc = 0; tc < 7; tc++) {
          if (tc === col) continue;
          if (card.value === 'K' && st.tableau[tc].length === 0 && ci === 0) continue;
          if (canDropOnTableauState(card, tc, st.tableau)) {
            const run = pile.splice(ci);
            st.tableau[tc].push(...run);
            flipExposedState(st);
            moved = true;
            break outerTab;
          }
        }
      }
    }
    if (moved) continue;

    if (st.stock.length > 0) {
      const c = st.stock.pop();
      c.faceUp = true;
      st.waste.push(c);
      continue;
    }

    if (st.waste.length > 0 && recycles < 8) {
      const playable = st.waste.some(wc => {
        for (let fi = 0; fi < 4; fi++) if (canDropOnFoundationState(wc, fi, st.foundations)) return true;
        for (let tc = 0; tc < 7; tc++) if (canDropOnTableauState(wc, tc, st.tableau)) return true;
        return false;
      });
      if (playable) {
        st.stock = st.waste.slice().reverse().map(c => ({ ...c, faceUp: false }));
        st.waste = [];
        recycles++;
        continue;
      }
    }
    break;
  }

  const found = st.foundations.reduce((n, f) => n + f.length, 0);
  const faceUp = st.tableau.reduce((n, col) => n + col.filter(c => c.faceUp).length, 0);
  // Prefer deals that build foundations and open the board early
  return bestFound * 12 + bestFaceUp * 2 + found * 3 + faceUp;
}

function deckToState(deck) {
  const st = { stock: [], waste: [], foundations: [[], [], [], []], tableau: Array.from({ length: 7 }, () => []) };
  let di = 0;
  for (let col = 0; col < 7; col++) {
    for (let row = 0; row <= col; row++) {
      st.tableau[col].push({ ...deck[di++], faceUp: row === col });
    }
  }
  st.stock = deck.slice(di).map(c => ({ ...c, faceUp: false }));
  return st;
}

/** Pick the most promising of several random deals (feels far less “dead on arrival”). */
function pickPlayableDeck(maxAttempts = 36) {
  let bestDeck = null;
  let bestScore = -1;
  for (let i = 0; i < maxAttempts; i++) {
    const deck = shuffle(createDeck());
    const score = scoreDealGreedy(deckToState(deck));
    if (score > bestScore) {
      bestScore = score;
      bestDeck = deck;
    }
    // Excellent deal: many cards built under simple play
    if (bestScore >= 120) break;
  }
  return bestDeck || shuffle(createDeck());
}


function newGame() {
  const deck = pickPlayableDeck();
  history     = [];
  selected    = null;
  moveCount   = 0;
  startTime   = null;
  timerStarted = false;
  gameInProgress = false;
  gameWon        = false;
  stuckCount = 0;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  dealFromDeck(deck);
  initialSnapshot = snapshot();

  updateUndoBtn();
  updateRestartDealBtn();
  document.getElementById('win-overlay').classList.add('hidden');
  if (typeof hideHiScorePanel === 'function') hideHiScorePanel();
  const winSubEl = document.getElementById('win-sub');
  if (winSubEl) {
    delete winSubEl.dataset.hasScore;
    const strings = (_cachedUIStrings && _cachedUIStrings[currentLang]) || SOL_UI_EN;
    winSubEl.textContent = strings.allCards || SOL_UI_EN.allCards;
  }
  clearCascade();
  clearHint();
  hintCycleIdx = 0;
  if (noMovesToastTimer) { clearTimeout(noMovesToastTimer); noMovesToastTimer = null; }
  if (hintToastTimer) { clearTimeout(hintToastTimer); hintToastTimer = null; }
  const noMovesToast = document.getElementById('no-moves-toast');
  if (noMovesToast) noMovesToast.classList.remove('visible');
  document.getElementById('hint-toast')?.classList.remove('visible');
  updateAutoCompleteUI();
  updateStats();
  render();
}

function restartDeal() {
  if (!initialSnapshot) { newGame(); return; }
  const prev = JSON.parse(initialSnapshot);
  stock = prev.stock;
  waste = prev.waste;
  foundations = prev.foundations;
  tableau = prev.tableau;
  history = [];
  selected = null;
  moveCount = 0;
  startTime = null;
  timerStarted = false;
  gameInProgress = false;
  gameWon = false;
  stuckCount = 0;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  updateUndoBtn();
  updateRestartDealBtn();
  document.getElementById('win-overlay').classList.add('hidden');
  clearCascade();
  clearHint();
  hintCycleIdx = 0;
  if (noMovesToastTimer) { clearTimeout(noMovesToastTimer); noMovesToastTimer = null; }
  if (hintToastTimer) { clearTimeout(hintToastTimer); hintToastTimer = null; }
  const noMovesToast = document.getElementById('no-moves-toast');
  if (noMovesToast) noMovesToast.classList.remove('visible');
  document.getElementById('hint-toast')?.classList.remove('visible');
  updateAutoCompleteUI();
  updateStats();
  render();
}

function updateRestartDealBtn() {
  const btn = document.getElementById('restart-deal-btn');
  if (btn) btn.disabled = !initialSnapshot;
}


/* ══════════════════════════════════════════════════════════
   UNDO
   ══════════════════════════════════════════════════════════ */
function snapshot() {
  return JSON.stringify({ stock, waste, foundations, tableau });
}

function saveHistory() {
  history.push(snapshot());
  if (history.length > MAX_HISTORY_LENGTH) history.shift();
  updateUndoBtn();
}

function undoMove() {
  if (history.length === 0) return;
  const prev = JSON.parse(history.pop());
  stock       = prev.stock;
  waste       = prev.waste;
  foundations = prev.foundations;
  tableau     = prev.tableau;
  selected    = null;
  updateUndoBtn();
  render();
}

function updateUndoBtn() {
  const btn = document.getElementById('undo-btn');
  if (btn) btn.disabled = history.length === 0;
}

/* ══════════════════════════════════════════════════════════
   MOVE VALIDATION
   ══════════════════════════════════════════════════════════ */
function canDropOnFoundation(card, fi) {
  const f = foundations[fi];
  if (f.length === 0)  return card.value === 'A';
  const top = f[f.length - 1];
  return top.suit === card.suit && numVal(card.value) === numVal(top.value) + 1;
}

function canDropOnTableau(card, col) {
  const pile = tableau[col];
  if (pile.length === 0) return card.value === 'K';
  const top = pile[pile.length - 1];
  if (!top.faceUp) return false;
  return isRed(top.suit) !== isRed(card.suit) &&
         numVal(card.value) === numVal(top.value) - 1;
}

/* ══════════════════════════════════════════════════════════
   FLIP EXPOSED FACE-DOWN CARDS
   ══════════════════════════════════════════════════════════ */
function flipExposed() {
  for (let col = 0; col < 7; col++) {
    const pile = tableau[col];
    if (pile.length > 0 && !pile[pile.length - 1].faceUp) {
      pile[pile.length - 1].faceUp = true;
    }
  }
}


/* ══════════════════════════════════════════════════════════
   EXECUTE MOVE
   Returns true if the move was legal and applied.
   ══════════════════════════════════════════════════════════ */
function executeMove(from, to) {
  // Gather cards to move
  let cards;
  if (from.pile === 'waste') {
    if (!waste.length) return false;
    cards = [waste[waste.length - 1]];
  } else if (from.pile === 'foundation') {
    const f = foundations[from.col];
    if (!f.length) return false;
    cards = [f[f.length - 1]];
  } else {
    // tableau
    const col = tableau[from.col];
    if (from.cardIdx >= col.length) return false;
    cards = col.slice(from.cardIdx);
  }

  if (!cards.length) return false;

  // Validate destination
  if (to.pile === 'foundation') {
    if (cards.length !== 1) return false;
    if (!canDropOnFoundation(cards[0], to.col)) return false;
  } else {
    // tableau
    if (!canDropOnTableau(cards[0], to.col)) return false;
  }

  saveHistory();
  moveCount++;
  updateStats();

  // Remove from source
  if (from.pile === 'waste') {
    waste.pop();
  } else if (from.pile === 'foundation') {
    foundations[from.col].pop();
  } else {
    tableau[from.col].splice(from.cardIdx);
  }

  // Add to destination
  if (to.pile === 'foundation') {
    foundations[to.col].push(...cards);
  } else {
    tableau[to.col].push(...cards);
  }

  flipExposed();
  clearHint();
  updateAutoCompleteUI();
  stuckCount = 0;
  return true;
}

/* ══════════════════════════════════════════════════════════
   AUTO-MOVE TO FOUNDATION — only when called from an explicit
   user interaction (double-click path). Never cascades others.
   ══════════════════════════════════════════════════════════ */
function tryAutoFoundation(pile, col) {
  let card;
  if (pile === 'waste') {
    if (!waste.length) return false;
    card = waste[waste.length - 1];
  } else if (pile === 'tableau') {
    const p = tableau[col];
    if (!p.length || !p[p.length - 1].faceUp) return false;
    card = p[p.length - 1];
  } else {
    return false;
  }

  for (let fi = 0; fi < 4; fi++) {
    if (canDropOnFoundation(card, fi)) {
      saveHistory();
      moveCount++;
      updateStats();
      if (pile === 'waste') waste.pop();
      else tableau[col].pop();
      foundations[fi].push(card);
      flipExposed();
      stuckCount = 0;
      return true;
    }
  }
  return false;
}

/* ══════════════════════════════════════════════════════════
   AUTO-PLACE (explicit user click on a card)
   Priority: 1) Foundation  2) Tableau non-empty  3) Tableau empty
   Moves ONLY the card/run the user clicked — never cascades other cards.
   ══════════════════════════════════════════════════════════ */
function tryAutoPlace(pile, col, cardIdx) {
  // Validate source
  if (pile === 'waste') {
    if (!waste.length) return false;
    cardIdx = waste.length - 1;
  } else if (pile === 'foundation') {
    if (!foundations[col].length) return false;
  } else {
    const p = tableau[col];
    if (cardIdx >= p.length || !p[cardIdx].faceUp) return false;
  }

  const from = { pile, col, cardIdx };
  const isRun = pile === 'tableau' && cardIdx < tableau[col].length - 1;

  // 1. Foundation for the clicked single card only (user intent via click on that card)
  if (!isRun && pile !== 'foundation') {
    for (let fi = 0; fi < 4; fi++) {
      if (executeMove(from, { pile: 'foundation', col: fi })) return true;
    }
  }

  // 2. Non-empty tableau columns
  for (let tc = 0; tc < 7; tc++) {
    if (pile === 'tableau' && tc === col) continue;
    if (tableau[tc].length === 0) continue;
    if (executeMove(from, { pile: 'tableau', col: tc })) return true;
  }

  // 3. Empty tableau columns
  for (let tc = 0; tc < 7; tc++) {
    if (pile === 'tableau' && tc === col) continue;
    if (tableau[tc].length > 0) continue;
    if (executeMove(from, { pile: 'tableau', col: tc })) return true;
  }

  return false;
}

/* ══════════════════════════════════════════════════════════
   STOCK CLICK
   ══════════════════════════════════════════════════════════ */
function clickStock() {
  if (stock.length > 0) {
    saveHistory();
    const count = Math.min(1, stock.length);
    for (let i = 0; i < count; i++) {
      const c = stock.pop();
      c.faceUp = true;
      waste.push(c);
    }
  } else if (waste.length > 0) {
    saveHistory();
    stock = [...waste].reverse().map(c => ({ ...c, faceUp: false }));
    waste = [];
  }
  selected = null;
  clearHint();
  moveCount++;
  updateStats();
  render();
  updateAutoCompleteUI();
  checkWin();
}

/* ══════════════════════════════════════════════════════════
   CLICK HANDLER — card
   Restored pre-cascade interaction model. Never cascades other cards.
   ══════════════════════════════════════════════════════════ */
function onCardClick(e, fromPile, fromCol, cardIdx) {
  e.stopPropagation();

  // Double-click → foundation for this card only (existing interaction)
  if (e.detail >= 2) {
    selected = null;
    if (tryAutoFoundation(fromPile, fromCol)) {
      render();
      checkWin();
    }
    return;
  }

  // If a card is already selected, try to move it onto the clicked position
  if (selected) {
    if (selected.pile === fromPile && selected.col === fromCol && selected.cardIdx === cardIdx) {
      selected = null;
      render();
      return;
    }

    let toPile, toCol;
    if (fromPile === 'foundation') {
      toPile = 'foundation'; toCol = fromCol;
    } else if (fromPile === 'tableau') {
      toPile = 'tableau'; toCol = fromCol;
    } else {
      selected = null;
      onCardClick(e, fromPile, fromCol, cardIdx);
      return;
    }

    const moved = executeMove(
      { pile: selected.pile, col: selected.col, cardIdx: selected.cardIdx },
      { pile: toPile, col: toCol }
    );
    if (moved) {
      selected = null;
      render();
      checkWin();
    } else {
      selected = null;
      if (tryAutoPlace(fromPile, fromCol, cardIdx)) {
        render();
        checkWin();
      } else {
        onCardClick(e, fromPile, fromCol, cardIdx);
      }
    }
    return;
  }

  // Nothing selected → tryAutoPlace moves only the clicked card/run
  if (tryAutoPlace(fromPile, fromCol, cardIdx)) {
    render();
    checkWin();
    return;
  }

  let ok = false;
  if (fromPile === 'waste') {
    ok = waste.length > 0 && waste[waste.length - 1].faceUp;
  } else if (fromPile === 'foundation') {
    ok = foundations[fromCol].length > 0 && cardIdx === foundations[fromCol].length - 1;
  } else {
    ok = cardIdx < tableau[fromCol].length && tableau[fromCol][cardIdx].faceUp;
  }
  if (!ok) return;
  selected = { pile: fromPile, col: fromCol, cardIdx };
  render();
}

/* ══════════════════════════════════════════════════════════
   CLICK HANDLER — empty slot
   ══════════════════════════════════════════════════════════ */
function onSlotClick(e, toPile, toCol) {
  e.stopPropagation();
  if (!selected) return;

  const moved = executeMove(
    { pile: selected.pile, col: selected.col, cardIdx: selected.cardIdx },
    { pile: toPile, col: toCol }
  );

  if (moved) {
    selected = null;
    render();
    checkWin();
  }
}

/* ══════════════════════════════════════════════════════════
   DRAG & DROP
   ══════════════════════════════════════════════════════════ */
let dragFrom = null;

function onDragStart(e, fromPile, fromCol, cardIdx) {
  let topCard;
  if (fromPile === 'waste') {
    if (!waste.length) { e.preventDefault(); return; }
    topCard = waste[waste.length - 1];
  } else if (fromPile === 'foundation') {
    if (!foundations[fromCol].length) { e.preventDefault(); return; }
    topCard = foundations[fromCol][foundations[fromCol].length - 1];
  } else {
    const col = tableau[fromCol];
    if (cardIdx >= col.length || !col[cardIdx].faceUp) { e.preventDefault(); return; }
    topCard = col[cardIdx];
  }

  if (!topCard || !topCard.faceUp) { e.preventDefault(); return; }

  dragFrom = { pile: fromPile, col: fromCol, cardIdx };
  selected = null;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'card');
  e.currentTarget.classList.add('card--dragging');
}

function onDragEnd(e) {
  dragFrom = null;
  e.currentTarget.classList.remove('card--dragging');
}

function onDragOver(e, toPile, toCol) {
  if (!dragFrom) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-active');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drop-active');
}

function onDrop(e, toPile, toCol) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('drop-active');
  if (!dragFrom) return;

  const from = dragFrom;
  dragFrom = null;

  const moved = executeMove(
    { pile: from.pile, col: from.col, cardIdx: from.cardIdx },
    { pile: toPile, col: toCol }
  );

  if (moved) {
    render();
    checkWin();
  }
}

/* ══════════════════════════════════════════════════════════
   WIN CHECK & ANIMATION
   ══════════════════════════════════════════════════════════ */
function checkWin() {
  if (foundations.every(f => f.length === 13)) showWin();
}

function showWin() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  // Track statistics
  gameWon = true;
  const elapsed = startTime ? Date.now() - startTime : 0;
  if (elapsed > 0 && elapsed < bestTime) bestTime = elapsed;
  recordGameResult(true);
  updateWinStats();

  const winSubEl = document.getElementById('win-sub');
  if (winSubEl) {
    const movesWord = (_cachedUIStrings[currentLang] && _cachedUIStrings[currentLang].moves) || SOL_UI_EN.moves;
    winSubEl.textContent = `${moveCount} ${movesWord} · ${formatTime(elapsed)}`;
    winSubEl.dataset.hasScore = '1';
  }
  updateAutoCompleteUI();
  startCascade();
  // Arcade board after a short beat so cascade can start
  window.setTimeout(() => {
    offerHiScore({ timeMs: elapsed, moves: moveCount });
  }, 900);
}

function startCascade() {
  if (cascadeAnimFrame) { cancelAnimationFrame(cascadeAnimFrame); cascadeAnimFrame = null; }
  const container = document.getElementById('cascade-container');
  container.innerHTML = '';
  container.classList.add('active');
  container.onclick = () => newGame();

  // Subtle "click to play again" hint
  const hint = document.createElement('div');
  hint.id = 'cascade-hint';
  hint.textContent = 'Click anywhere to play again';
  container.appendChild(hint);

  runBounce(container);
}

/* ── Windows Solitaire–style bouncing cards ─────────────────────── */
function runBounce(container) {
  const cardW = getCardW();
  const cardH = getCardH();
  const sw = window.innerWidth;
  const sh = window.innerHeight;

  // 52 cards shuffled for random launch order
  const allCardDefs = [];
  for (const suit of SUITS) {
    for (const val of VALUES) allCardDefs.push({ suit, value: val });
  }
  for (let i = allCardDefs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allCardDefs[i], allCardDefs[j]] = [allCardDefs[j], allCardDefs[i]];
  }

  const activeCards = [];
  let launchedCount = 0;
  let tick = 0;
  const LAUNCH_EVERY = 7; // ~60fps → ~8-9 cards/second

  function launchCard() {
    if (launchedCount >= allCardDefs.length) return;
    const def = allCardDefs[launchedCount++];

    const el = document.createElement('div');
    el.className = 'cascade-card' + (isRed(def.suit) ? ' cascade-red' : '');
    el.innerHTML = `<span class="cc-rank">${def.value}</span><span class="cc-suit-center">${def.suit}</span>`;
    container.appendChild(el);

    // Launch from the foundation area (top 10–22% of screen, right 50–90%)
    const startX = sw * 0.50 + Math.random() * sw * 0.40;
    const startY = sh * 0.06 + Math.random() * sh * 0.16;

    // Spread in all directions with a leftward bias, moderate upward push
    const speed = 9 + Math.random() * 13;
    const angle = Math.PI * (0.55 + Math.random() * 0.90); // ~99°–261° (mostly left + up/down)
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed * 0.85;

    activeCards.push({
      el,
      x: startX, y: startY,
      vx, vy,
      rot: (Math.random() - 0.5) * 30,
      rotSpeed: (Math.random() - 0.5) * 4,
      settled: false,
    });
  }

  function frame() {
    tick++;
    if (tick % LAUNCH_EVERY === 1) launchCard();

    for (const c of activeCards) {
      if (c.settled) continue;

      c.vy += 0.52; // gravity
      c.x  += c.vx;
      c.y  += c.vy;
      c.rot += c.rotSpeed;

      // Bottom bounce — high energy retention for tall arches (Win95 style)
      if (c.y + cardH >= sh) {
        c.y  = sh - cardH;
        c.vy = -Math.abs(c.vy) * 0.76;
        c.vx *= 0.92;
        c.rotSpeed *= 0.65;
        if (Math.abs(c.vy) < 1.5) {
          c.vy = 0;
          c.settled = true;
          c.rotSpeed = 0;
        }
      }

      // Side walls
      if (c.x < 0)          { c.x = 0;          c.vx =  Math.abs(c.vx) * 0.75; }
      if (c.x + cardW > sw) { c.x = sw - cardW;  c.vx = -Math.abs(c.vx) * 0.75; }
      // Top wall (rarely hit)
      if (c.y < 0)          { c.y = 0;           c.vy =  Math.abs(c.vy) * 0.80; }

      c.el.style.left      = `${c.x.toFixed(1)}px`;
      c.el.style.top       = `${c.y.toFixed(1)}px`;
      c.el.style.transform = `rotate(${c.rot.toFixed(1)}deg)`;
    }

    cascadeAnimFrame = requestAnimationFrame(frame);
  }
  cascadeAnimFrame = requestAnimationFrame(frame);
}

/* ── Confetti rain ───────────────────────────────────────────────── */
function runConfetti(container) {
  const sw = window.innerWidth;
  const sh = window.innerHeight;
  const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#e91e8c','#1abc9c','#ff6b6b','#ffd93d'];
  const PIECE_COUNT = 200;
  const pieces = [];

  for (let i = 0; i < PIECE_COUNT; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const w = 6 + Math.random() * 10;
    const h = w * (0.4 + Math.random() * 0.8);
    el.style.width  = `${w}px`;
    el.style.height = `${h}px`;
    el.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
    container.appendChild(el);

    pieces.push({
      el,
      x: Math.random() * sw,
      y: -20 - Math.random() * sh,       // start above screen at varied depths
      vx: (Math.random() - 0.5) * 2.5,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 8,
      sineOffset: Math.random() * Math.PI * 2,
      sineAmp: 0.6 + Math.random() * 1.2,
      sineFreq: 0.03 + Math.random() * 0.04,
    });
  }

  let tick = 0;
  function frame() {
    tick++;
    for (const p of pieces) {
      p.x  += p.vx + Math.sin(tick * p.sineFreq + p.sineOffset) * p.sineAmp;
      p.y  += p.vy;
      p.rot += p.rotSpeed;

      // Wrap around — loop back to top when off-screen
      if (p.y > sh + 20) {
        p.x = Math.random() * sw;
        p.y = -20;
      }
      if (p.x < -20) p.x = sw + 20;
      if (p.x > sw + 20) p.x = -20;

      p.el.style.left      = `${p.x.toFixed(1)}px`;
      p.el.style.top       = `${p.y.toFixed(1)}px`;
      p.el.style.transform = `rotate(${p.rot.toFixed(1)}deg)`;
    }
    cascadeAnimFrame = requestAnimationFrame(frame);
  }
  cascadeAnimFrame = requestAnimationFrame(frame);
}

/* ── Fireworks sparkle bursts ────────────────────────────────────── */
function runFireworks(container) {
  const sw = window.innerWidth;
  const sh = window.innerHeight;
  const COLORS = ['#ff4757','#ffa502','#ffdd59','#7bed9f','#70a1ff','#eccc68','#ff6b81','#a29bfe','#fd79a8','#ffffff'];
  const PARTICLES_PER_BURST = 36;
  const MAX_BURSTS = 6;
  const BURST_INTERVAL = 80; // ticks between bursts (~1.3s at 60fps)
  const particles = [];
  let burstCount = 0;
  let lastBurstTick = -9999;

  function addBurst() {
    if (burstCount >= MAX_BURSTS) return;
    burstCount++;
    const bx = sw * 0.15 + Math.random() * sw * 0.70;
    const by = sh * 0.10 + Math.random() * sh * 0.60;
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const size  = 5 + Math.random() * 5;

    for (let i = 0; i < PARTICLES_PER_BURST; i++) {
      const el = document.createElement('div');
      el.className = 'fw-particle';
      const ps = size * (0.5 + Math.random() * 0.5);
      el.style.width  = `${ps}px`;
      el.style.height = `${ps}px`;
      el.style.background = color;
      container.appendChild(el);

      const angle  = (i / PARTICLES_PER_BURST) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
      const speed  = 4 + Math.random() * 9;
      particles.push({
        el,
        x: bx, y: by,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        life: 1,
        decay: 0.016 + Math.random() * 0.012,
      });
    }
  }

  let tick = 0;
  function frame() {
    tick++;

    // Fire a new burst every BURST_INTERVAL ticks, starting immediately
    if (tick - lastBurstTick >= BURST_INTERVAL) {
      lastBurstTick = tick;
      addBurst();
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.vy   += 0.12; // gentle gravity
      p.vx   *= 0.97;
      p.vy   *= 0.97;
      p.x    += p.vx;
      p.y    += p.vy;
      p.life -= p.decay;
      p.alpha = Math.max(0, p.life);

      if (p.alpha <= 0) {
        p.el.remove();
        particles.splice(i, 1);
        continue;
      }

      p.el.style.left    = `${p.x.toFixed(1)}px`;
      p.el.style.top     = `${p.y.toFixed(1)}px`;
      p.el.style.opacity = p.alpha.toFixed(3);
    }

    cascadeAnimFrame = requestAnimationFrame(frame);
  }
  cascadeAnimFrame = requestAnimationFrame(frame);
}

function clearCascade() {
  if (cascadeAnimFrame) { cancelAnimationFrame(cascadeAnimFrame); cascadeAnimFrame = null; }
  const container = document.getElementById('cascade-container');
  if (container) {
    container.innerHTML = '';
    container.classList.remove('active');
    container.onclick = null;
  }
}

/* ══════════════════════════════════════════════════════════
   STATS (move counter + timer)
   ══════════════════════════════════════════════════════════ */
function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2, '0')}`;
}

function updateStats() {
  if (moveCount > 0 && !timerStarted) {
    timerStarted = true;
    startTime = Date.now();
    timerInterval = setInterval(updateStats, 1000);
  }
  if (moveCount === 1 && !gameInProgress) {
    gameInProgress = true;
  }
  const movesEl = document.getElementById('stat-moves');
  const timeEl  = document.getElementById('stat-time');
  if (movesEl) movesEl.textContent = moveCount;
  if (timeEl) timeEl.textContent = startTime ? formatTime(Date.now() - startTime) : '0:00';
}

/* ══════════════════════════════════════════════════════════
   CARD SIZE (kept in sync between CSS vars and JS)
   ══════════════════════════════════════════════════════════ */
function updateLayoutInsets() {
  const root = document.documentElement;
  const toolbar = document.querySelector('.game-toolbar');
  const credits = document.getElementById('bottom-badges');
  const gap = 10;

  if (toolbar) {
    // Use full toolbar box (chrome + tuner + game rows)
    const bottom = toolbar.getBoundingClientRect().bottom;
    root.style.setProperty('--sol-toolbar-offset', `${Math.ceil(bottom + gap)}px`);
  }

  if (credits && credits.classList.contains('visible')) {
    const top = credits.getBoundingClientRect().top;
    root.style.setProperty(
      '--credits-bar-offset',
      `${Math.max(0, window.innerHeight - top + gap)}px`
    );
  } else {
    root.style.setProperty('--credits-bar-offset', '0px');
  }
}

function updateCardSize() {
  const root    = document.documentElement;
  // Use actual board element width for accuracy
  const boardEl = document.getElementById('game-board');
  const boardW  = boardEl
    ? Math.min(980, boardEl.getBoundingClientRect().width || window.innerWidth)
    : Math.min(980, window.innerWidth);

  const GAP  = 8;
  const PAD  = 12;
  const raw  = (boardW - 2 * PAD - 6 * GAP) / 7;
  const cardW = Math.min(120, Math.max(36, raw));
  const cardH = cardW * 1.4;

  root.style.setProperty('--card-w', `${cardW.toFixed(1)}px`);
  root.style.setProperty('--card-h', `${cardH.toFixed(1)}px`);
}

function getCardW() {
  return parseFloat(
    getComputedStyle(document.documentElement).getPropertyValue('--card-w')
  ) || 70;
}
function getCardH() {
  return parseFloat(
    getComputedStyle(document.documentElement).getPropertyValue('--card-h')
  ) || 98;
}
function overlapDown() { return Math.min(16, getCardH() * 0.155); }
function overlapUp()   { return Math.min(28, getCardH() * 0.28);  }
