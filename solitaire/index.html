/* ══════════════════════════════════════════════════════════
   PIP CARD SVG ART (Bicycle-style pip layouts)
   ══════════════════════════════════════════════════════════ */
function makePipCardSVG(value, suit) {
  // Pip font size by card value (viewBox 0 0 100 140)
  const pipSize = {
    'A': 32, '2': 19, '3': 18, '4': 17, '5': 16,
    '6': 15, '7': 14, '8': 13, '9': 12, '10': 11
  }[value] || 14;

  // [x, y, rotated180] — classic Bicycle pip positions
  // Corners occupy ~y 0-38 and ~y 102-140, so safe zone is y 38-102
  // but pips may overlap corners visually since corners have z-index:2
  const positions = {
    'A':  [[50, 70, false]],
    '2':  [[50, 35, false], [50, 105, true]],
    '3':  [[50, 35, false], [50, 70, false], [50, 105, true]],
    '4':  [[30, 35, false], [70, 35, false],
           [30, 105, true], [70, 105, true]],
    '5':  [[30, 35, false], [70, 35, false], [50, 70, false],
           [30, 105, true], [70, 105, true]],
    '6':  [[30, 35, false], [70, 35, false],
           [30, 70, false], [70, 70, false],
           [30, 105, true], [70, 105, true]],
    '7':  [[30, 35, false], [70, 35, false], [50, 52, false],
           [30, 70, false], [70, 70, false],
           [30, 105, true], [70, 105, true]],
    '8':  [[30, 35, false], [70, 35, false], [50, 52, false],
           [30, 70, false], [70, 70, false],
           [50, 88, true],  [30, 105, true], [70, 105, true]],
    '9':  [[30, 31, false], [70, 31, false],
           [30, 54, false], [70, 54, false], [50, 70, false],
           [30, 86, true],  [70, 86, true],
           [30, 109, true], [70, 109, true]],
    '10': [[30, 31, false], [70, 31, false], [50, 43, false],
           [30, 57, false], [70, 57, false],
           [30, 83, true],  [70, 83, true],
           [50, 97, true],  [30, 109, true], [70, 109, true]],
  }[value] || [];

  const pips = positions.map(([x, y, rotated]) => {
    const rot = rotated ? `transform="rotate(180 ${x} ${y})"` : '';
    return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central"
      font-size="${pipSize}" font-family="inherit" ${rot}>${suit}</text>`;
  }).join('\n    ');

  // Ace gets a double inner border for classic ornate look
  const border = value === 'A'
    ? `<rect x="5"  y="5"  width="90" height="130" rx="3"
             fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.28"/>
       <rect x="11" y="11" width="78" height="118" rx="2"
             fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.18"/>`
    : `<rect x="5" y="5" width="90" height="130" rx="3"
             fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.28"/>`;

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140"
              preserveAspectRatio="xMidYMid meet">
    ${border}
    ${pips}
  </svg>`;
}

/* ══════════════════════════════════════════════════════════
   CARD BACK HTML HELPER (sprite or custom SVG fallback)
   ══════════════════════════════════════════════════════════ */
function makeLocalCardBackHTML() {
  return `<div class="card-back-art" aria-hidden="true">${makeCardBackSVG()}</div>`;
}

function makeLocalCardFaceHTML(c) {
  const isCourt = c.value === 'J' || c.value === 'Q' || c.value === 'K';
  const art = isCourt ? makeFaceCardSVG(c.value) : makePipCardSVG(c.value, c.suit);
  const corner = `<span class="card-val">${c.value}</span><span class="card-suit-sm">${c.suit}</span>`;
  return (
    `<div class="card-corner" aria-hidden="true">${corner}</div>` +
    `<div class="card-face-art" aria-hidden="true">${art}</div>` +
    `<div class="card-corner card-corner--br" aria-hidden="true">${corner}</div>`
  );
}

function makeCardBackHTML() {
  // Beautiful Deck of Cards API back; silent SVG fallback if CDN fails
  return `<img class="card-api-img" src="${DECK_API_IMG}/back.png" alt="" draggable="false" decoding="async">`;
}

function attachCardImageFallback(el, c, isBack) {
  const img = el.querySelector('img.card-api-img');
  if (!img) return;
  const applyFallback = () => {
    if (isBack) {
      el.innerHTML = makeLocalCardBackHTML();
    } else {
      el.classList.add('card--local-art');
      el.innerHTML = makeLocalCardFaceHTML(c);
    }
  };
  img.addEventListener('error', applyFallback, { once: true });
  // Cached failure / already broken
  if (img.complete && img.naturalWidth === 0) applyFallback();
}

/* ══════════════════════════════════════════════════════════
   BUILD CARD ELEMENT
   ══════════════════════════════════════════════════════════ */
function makeCard(c, fromPile, fromCol, cardIdx) {
  const el = document.createElement('div');
  el.className = 'card';

  if (!c.faceUp) {
    el.classList.add('card--back');
    el.setAttribute('aria-label', 'Face-down card');
    el.innerHTML = makeCardBackHTML();
    attachCardImageFallback(el, c, true);
    return el;
  }

  el.classList.add('card--face');
  el.classList.add(isRed(c.suit) ? 'card--red' : 'card--black');
  el.setAttribute('aria-label', `${c.value} of ${c.suit}`);
  el.setAttribute('draggable', 'true');
  el.dataset.key = `${c.suit}_${c.value}`;

  // Selected highlight for this card (or any card in a selected tableau run)
  if (selected) {
    const sameSource = selected.pile === fromPile && selected.col === fromCol;
    const inRun = fromPile === 'tableau'
      ? cardIdx >= selected.cardIdx
      : cardIdx === selected.cardIdx;
    if (sameSource && inRun) el.classList.add('card--selected');
  }

  // Primary: Deck of Cards API art
  el.innerHTML = makeCardFaceHTML(c);
  attachCardImageFallback(el, c, false);

  // Interactions
  el.addEventListener('click',     e => onCardClick(e, fromPile, fromCol, cardIdx));
  el.addEventListener('dragstart', e => onDragStart(e, fromPile, fromCol, cardIdx));
  el.addEventListener('dragend',   onDragEnd);

  return el;
}

/* ══════════════════════════════════════════════════════════
   CARD ART HELPERS — Deck of Cards API
   ══════════════════════════════════════════════════════════ */
const SUIT_API  = { '♠': 'S', '♥': 'H', '♦': 'D', '♣': 'C' };

function makeCardFaceHTML(c) {
  const v = c.value === '10' ? '0' : c.value;
  const s = SUIT_API[c.suit];
  // Empty alt: never paint “3 of ♥” if the image fails before onerror runs
  return `<img class="card-api-img" src="${DECK_API_IMG}/${v}${s}.png" alt="" draggable="false" decoding="async">`;
}

/* ══════════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════════ */
function render() {
  const board = document.getElementById('game-board');

  // FLIP — First: snapshot positions of all visible face-up cards before DOM wipe
  const prevRects = new Map();
  board.querySelectorAll('.card[data-key]').forEach(el => {
    prevRects.set(el.dataset.key, el.getBoundingClientRect());
  });

  board.innerHTML = '';

  const cardH = getCardH();

  /* ── TOP ROW ── */
  const topRow = document.createElement('div');
  topRow.className = 'top-row';

  // Foundations (4) — leftmost
  for (let fi = 0; fi < 4; fi++) {
    const fw = document.createElement('div');
    fw.className = 'pile-wrapper foundation-wrapper';
    fw.setAttribute('aria-label', `Foundation ${fi + 1}`);

    const fSlot = document.createElement('div');
    fSlot.className = 'card-slot';
    fSlot.innerHTML = `<span class="slot-label" aria-hidden="true">A</span>`;

    addDropListeners(fSlot, 'foundation', fi);
    fSlot.addEventListener('click', e => onSlotClick(e, 'foundation', fi));
    fw.appendChild(fSlot);

    if (foundations[fi].length > 0) {
      const topF = foundations[fi][foundations[fi].length - 1];
      const fCard = makeCard(topF, 'foundation', fi, foundations[fi].length - 1);
      fCard.style.cssText = 'position:absolute;inset:0;width:100%;height:var(--card-h);';
      addDropListeners(fCard, 'foundation', fi);
      fw.appendChild(fCard);
    }

    topRow.appendChild(fw);
  }

  // Spacer
  const spacer = document.createElement('div');
  spacer.className = 'pile-wrapper';
  spacer.setAttribute('aria-hidden', 'true');
  spacer.style.visibility = 'hidden';
  topRow.appendChild(spacer);

  // Waste — show cards fanned left (1 card in draw-1 mode, up to 3 in draw-3 mode)
  const wasteWrap = document.createElement('div');
  wasteWrap.className = 'pile-wrapper';
  wasteWrap.style.overflow = 'visible';
  wasteWrap.setAttribute('aria-label', waste.length
    ? `Waste: top card ${waste[waste.length-1].value} of ${waste[waste.length-1].suit}`
    : 'Waste empty');

  const wasteSlot = document.createElement('div');
  wasteSlot.className = 'card-slot';
  wasteWrap.appendChild(wasteSlot);

  if (waste.length > 0) {
    const fanCount = 3;
    const visCount = Math.min(fanCount, waste.length);
    for (let i = 0; i < visCount; i++) {
      const wIdx = waste.length - visCount + i;
      const wCard = makeCard(waste[wIdx], 'waste', null, wIdx);
      const offset = (visCount - 1 - i) * 16; // fan left: front card has 0 offset
      wCard.style.cssText = `position:absolute;right:${offset}px;top:0;width:100%;height:var(--card-h);z-index:${i+1};`;
      if (i < visCount - 1) {
        // Not the top card: remove interaction
        wCard.style.pointerEvents = 'none';
        wCard.removeAttribute('draggable');
      }
      wasteWrap.appendChild(wCard);
    }
  }
  topRow.appendChild(wasteWrap);

  // Stock — rightmost
  const stockWrap = document.createElement('div');
  stockWrap.className = 'pile-wrapper stock-wrapper';
  stockWrap.setAttribute('aria-label', stock.length
    ? `Stock: ${stock.length} cards`
    : 'Stock empty – click to recycle');

  const stockSlot = document.createElement('div');
  stockSlot.className = 'card-slot';
  stockSlot.innerHTML = `<span class="slot-label" aria-hidden="true">${stock.length === 0 ? '↩' : ''}</span>`;
  stockSlot.addEventListener('dragover', e => { e.preventDefault(); });
  stockWrap.appendChild(stockSlot);

  if (stock.length > 0) {
    const backCard = document.createElement('div');
    backCard.className = 'card card--back';
    backCard.style.cssText = 'inset:0;width:100%;height:100%;cursor:pointer;';
    backCard.innerHTML = makeCardBackHTML();
    attachCardImageFallback(backCard, null, true);
    stockWrap.appendChild(backCard);
  }
  stockWrap.addEventListener('click', clickStock);
  topRow.appendChild(stockWrap);

  board.appendChild(topRow);

  /* ── TABLEAU ── */
  const tabRow = document.createElement('div');
  tabRow.className = 'tableau-row';

  for (let col = 0; col < 7; col++) {
    const pile = tableau[col];
    const colEl = document.createElement('div');
    colEl.className = 'tableau-pile';
    colEl.setAttribute('aria-label', `Tableau column ${col + 1}`);

    // Empty slot / drop target background
    const tSlot = document.createElement('div');
    tSlot.className = 'card-slot';
    tSlot.innerHTML = '<span class="slot-label" style="opacity:0.25" aria-hidden="true">K</span>';
    tSlot.style.cssText = `position:relative;z-index:0;`;
    addDropListeners(tSlot, 'tableau', col);
    tSlot.addEventListener('click', e => onSlotClick(e, 'tableau', col));
    colEl.appendChild(tSlot);

    // Stack cards
    let topOffset = 0;
    for (let ci = 0; ci < pile.length; ci++) {
      const c = pile[ci];
      const cEl = makeCard(c, 'tableau', col, ci);
      cEl.style.cssText =
        `position:absolute;inset:0;top:${topOffset.toFixed(1)}px;` +
        `width:100%;height:var(--card-h);z-index:${ci + 1};`;

      if (c.faceUp) {
        // Also allow drop onto a face-up tableau card
        addDropListeners(cEl, 'tableau', col);
      }

      colEl.appendChild(cEl);

      if (ci < pile.length - 1) {
        topOffset += c.faceUp ? overlapUp() : overlapDown();
      }
    }

    // Set column height to fit all stacked cards
    const colHeight = pile.length > 0 ? topOffset + cardH : cardH;
    colEl.style.height = `${colHeight.toFixed(1)}px`;

    tabRow.appendChild(colEl);
  }

  board.appendChild(tabRow);

  // FLIP — Play: animate each card from its previous position to its new one
  if (prevRects.size > 0) {
    board.querySelectorAll('.card[data-key]').forEach(el => {
      const prev = prevRects.get(el.dataset.key);
      if (!prev) {
        // Newly revealed card (face-down → face-up) — play a flip/reveal animation
        el.animate(
          [
            { transform: 'scaleX(0.08)', filter: 'brightness(1.5)', offset: 0 },
            { transform: 'scaleX(1)',    filter: 'brightness(1)',   offset: 1 },
          ],
          { duration: 220, easing: 'ease-out', fill: 'none' }
        );
        return;
      }
      const curr = el.getBoundingClientRect();
      const dx = prev.left - curr.left;
      const dy = prev.top - curr.top;
      if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
      el.animate(
        [{ transform: `translate(${dx}px, ${dy}px)` }, { transform: 'translate(0px, 0px)' }],
        { duration: 200, easing: 'cubic-bezier(0.2, 0, 0.2, 1)', fill: 'none' }
      );
    });
  }
}

/* ════════════════════════════════════════
   DROP LISTENER HELPER
   ════════════════════════════════════════ */
function addDropListeners(el, toPile, toCol) {
  el.addEventListener('dragover',   e => onDragOver(e, toPile, toCol));
  el.addEventListener('dragleave',  onDragLeave);
  el.addEventListener('drop',       e => onDrop(e, toPile, toCol));
}

document.getElementById('home-reload-btn')?.addEventListener('click', () => location.reload());
document.getElementById('autocomplete-btn').addEventListener('click', autoComplete);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && selected) {
    selected = null;
    render();
  }
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    undoMove();
  }
  if ((e.key === 'h' || e.key === 'H') && !e.ctrlKey && !e.metaKey) {
    showHint();
  }
  if ((e.key === 'r' || e.key === 'R') && !e.ctrlKey && !e.metaKey && !e.altKey) {
    const tag = (e.target && e.target.tagName) || '';
    if (tag !== 'INPUT' && tag !== 'TEXTAREA') restartDeal();
  }
});

// Deselect on board background click
document.getElementById('game-board').addEventListener('click', () => {
  if (selected) { selected = null; render(); }
});

// Responsive resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    updateLayoutInsets();
    updateCardSize();
    render();
  }, 80);
});

(function watchLayoutInsets() {
  const toolbar = document.querySelector('.game-toolbar');
  const credits = document.getElementById('bottom-badges');
  if (typeof ResizeObserver === 'undefined') return;
  const ro = new ResizeObserver(() => updateLayoutInsets());
  if (toolbar) ro.observe(toolbar);
  if (credits) ro.observe(credits);
})();

(function initRadarEmbed() {
  const iframe = document.getElementById('radar-embed');
  if (!iframe) return;

  // Same-origin embed (Le Radar root). Keep relative path — works on le-radar.ca and local :port.
  if (!iframe.getAttribute('src') || iframe.getAttribute('src') === 'about:blank') {
    iframe.src = '../tuner-embed.html';
  }

  // Hauteur / ready signalés par le-radar/embed.js
  window.addEventListener('message', (event) => {
    const data = event && event.data;
    // Accept legacy Ataraxia message type + new radar-embed
    if (!data || (data.type !== 'radar-embed' && data.type !== 'ataraxia-radar-embed')) return;
    if (typeof data.height === 'number' && data.height > 0) {
      const h = Math.round(data.height);
      document.documentElement.style.setProperty('--radar-embed-slot-h', h + 'px');
      iframe.style.height = h + 'px';
    }
    if (data.ready) iframe.classList.add('is-ready');
  });

  iframe.addEventListener('load', () => {
    // Fallback si postMessage bloqué / ancien embed
    iframe.classList.add('is-ready');
  });
})();

// Deduplicate by photo identity (same asset, any params/size).
(function() {
  function photoKey(url) {
    try {
      const u = new URL(url);
      if (u.hostname.includes('unsplash.com')) {
        const m = u.pathname.match(/photo-([a-zA-Z0-9_-]+)/);
        return m ? 'unsplash:' + m[1] : u.pathname;
      }
      if (u.hostname.includes('pexels.com')) {
        const m = u.pathname.match(/\/photos\/(\d+)/);
        return m ? 'pexels:' + m[1] : u.pathname;
      }
      if (u.hostname.includes('wikimedia.org')) {
        return 'wiki:' + u.pathname.replace(/\/\d+px-/, '/');
      }
      return u.origin + u.pathname;
    } catch { return url; }
  }
  const _seen = new Set();
  const _deduped = BACKGROUNDS.filter(bg => {
    const key = photoKey(bg.url);
    if (_seen.has(key)) return false;
    _seen.add(key);
    return true;
  });
  BACKGROUNDS.length = 0;
  BACKGROUNDS.push(..._deduped);
})();

// ── Background quality + smart random (aligned with js/backgrounds.js) ──
function _randInt(n) {
  if (n <= 1) return 0;
  try {
    if (typeof crypto !== 'undefined' && crypto.getRandomValues) {
      const buf = new Uint32Array(1);
      const max = 0x100000000;
      const limit = max - (max % n);
      let x;
      do { crypto.getRandomValues(buf); x = buf[0]; } while (x >= limit);
      return x % n;
    }
  } catch (_) {}
  return Math.floor(Math.random() * n);
}
function _shuffleInPlace(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = _randInt(i + 1);
    const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}
function _responsiveImgWidth() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const vw = (window.innerWidth || screen.width || 1280) * dpr;
  if (vw <= 720)  return 800;
  if (vw <= 1100) return 1280;
  if (vw <= 1700) return 1920;
  return 2560;
}
function _optimizeBgUrl(rawUrl) {
  if (!rawUrl) return rawUrl;
  let url = rawUrl;
  const w = _responsiveImgWidth();
  if (url.includes('images.unsplash.com')) {
    try {
      const u = new URL(url);
      u.searchParams.set('w', String(w));
      u.searchParams.set('q', '90');
      u.searchParams.set('auto', 'format');
      u.searchParams.set('fit', 'max');
      url = u.href;
    } catch (_) {
      url = url.replace(/([?&])w=\d+/g, `$1w=${w}`).replace(/([?&])q=\d+/g, '$1q=90');
    }
  } else if (url.includes('images.pexels.com')) {
    try {
      const u = new URL(url);
      u.searchParams.set('auto', 'compress');
      u.searchParams.set('cs', 'tinysrgb');
      u.searchParams.set('w', String(w));
      url = u.href;
    } catch (_) {
      url = url.replace(/([?&])w=\d+/g, `$1w=${w}`);
    }
  } else if (url.includes('upload.wikimedia.org')) {
    url = url.replace(/\/(800|1024|1280)px-/g, '/1920px-');
  }
  return url;
}
function _bgMood(bg) {
  if (!bg) return 'other';

  const t = `${bg.title || ''} ${bg.credit || ''}`.toLowerCase();
  if (/aurora|milky|star|night|galaxy|space|nocturne/.test(t)) return 'night';
  if (/ocean|sea|coast|beach|wave|shore|cliff/.test(t)) return 'ocean';
  if (/desert|dune|sand|canyon|arid/.test(t)) return 'desert';
  if (/snow|winter|ice|frost|glacier/.test(t)) return 'winter';
  if (/forest|tree|wood|pine|canopy|redwood|birch/.test(t)) return 'forest';
  if (/mountain|peak|summit|alps|himalaya|ridge/.test(t)) return 'mountain';
  if (/lake|river|waterfall|stream|pond/.test(t)) return 'water';
  if (/sunset|sunrise|dawn|dusk|golden|lavender|meadow|field/.test(t)) return 'golden';
  if (/fog|mist|cloud|haze|overcast/.test(t)) return 'mist';
  if (bg.source && /wikimedia|public domain/i.test(bg.source)) return 'art';
  return 'nature';
}

    layerNext.offsetHeight;
    layerNext.style.transition = '';
    requestAnimationFrame(() => { layerNext.classList.add('loaded'); });

    try { localStorage.setItem('ataraxia_bg_url', url); } catch(e) {}

    credit.textContent = '';
    const safeLink = (() => {
      try {
        const u = new URL(String(linkUrl || '').trim());
        return u.protocol === 'https:' ? u.href : null;
      } catch { return null; }
    })();
    if (source === 'Unsplash' || source === 'Pexels') {
      const titlePart = title ? `«${title}» · ` : '';
      credit.appendChild(document.createTextNode(`Photo: ${titlePart}`));
      if (safeLink) {
        const a = document.createElement('a');
        a.href = safeLink;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = creditText;
        credit.appendChild(a);
      } else {
        credit.appendChild(document.createTextNode(creditText));
      }
      credit.appendChild(document.createTextNode(` · ${source}`));
    } else if (safeLink) {
      const a = document.createElement('a');
      a.href = safeLink;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = creditText;
      credit.appendChild(a);
      credit.appendChild(document.createTextNode(` · ${source}`));
    } else {
      credit.appendChild(document.createTextNode(`${creditText} · ${source}`));
    }
    document.querySelector('.bottom-badges').classList.add('visible');
    requestAnimationFrame(() => {
      updateLayoutInsets();
      updateCardSize();
    });

    function onTransitionEnd(e) {
      if (e.propertyName !== 'opacity' || e.target !== layerNext) return;
      layerNext.removeEventListener('transitionend', onTransitionEnd);
      _bgCrossfadeCleanup = null;
      layerCurrent.style.backgroundImage = `url(${url})`;
      layerNext.style.transition = 'none';
      layerNext.classList.remove('loaded');
      layerNext.style.backgroundImage = '';
      requestAnimationFrame(() => { layerNext.style.transition = ''; });
    }
    layerNext.addEventListener('transitionend', onTransitionEnd);

    _bgCrossfadeCleanup = () => {
      layerNext.removeEventListener('transitionend', onTransitionEnd);
      if (layerNext.style.backgroundImage) {
        layerCurrent.style.backgroundImage = layerNext.style.backgroundImage;
      }
      layerNext.style.transition = 'none';
      layerNext.classList.remove('loaded');
      layerNext.style.backgroundImage = '';
      requestAnimationFrame(() => { layerNext.style.transition = ''; });
    };
  };
  img.onerror = () => {
    _failedBg.add(currentBgIdx);
    _nextFromPool();
  };
  img.src = url;
}

function _refillBgBag() {
  const avoid = new Set(recentBgs.slice(-SOL_MAX_RECENT_BGS));
  const all = Array.from({ length: BACKGROUNDS.length }, (_, i) => i)
    .filter(i => !_failedBg.has(i));
  const fresh = all.filter(i => !avoid.has(i));
  const bag = (fresh.length >= 12 ? fresh : all).slice();
  _shuffleInPlace(bag);
  _bgBag = bag;
}

function _scoreCandidate(idx) {
  const bg = BACKGROUNDS[idx];
  let score = 10 + _randInt(5);
  const mood = _bgMood(bg);
  // Soft fog/cloud stock is less engaging as a wallpaper — deprioritize.
  if (mood === 'mist') score -= 5;
  for (let k = 0; k < _recentMoods.length; k++) {
    if (_recentMoods[_recentMoods.length - 1 - k] === mood) score -= (6 - k);
  }
  if (!recentBgs.includes(idx)) score += 3;
  return score;
}

function getRandomBgIndex() {
  _bgBag = _bgBag.filter(i => i !== currentBgIdx && !_failedBg.has(i) && i >= 0 && i < BACKGROUNDS.length);
  if (_bgBag.length < 3) {
    _refillBgBag();
    _bgBag = _bgBag.filter(i => i !== currentBgIdx);
    if (!_bgBag.length) _refillBgBag();
  }
  const window = _bgBag.slice(0, Math.min(10, _bgBag.length));
  let best = window[0] ?? 0;
  let bestScore = -Infinity;
  for (const i of window) {
    const s = _scoreCandidate(i);
    if (s > bestScore) { bestScore = s; best = i; }
  }
  _bgBag = _bgBag.filter(i => i !== best);
  return best;
}

function recordBgSeen(idx) {
  recentBgs = recentBgs.filter(i => i !== idx);
  recentBgs.push(idx);
  if (recentBgs.length > SOL_MAX_RECENT_BGS) recentBgs.shift();
  try { localStorage.setItem(SOL_RECENT_BGS_KEY, JSON.stringify(recentBgs)); } catch(e) {}
  _recentMoods.push(_bgMood(BACKGROUNDS[idx]));
  if (_recentMoods.length > 6) _recentMoods.shift();
  _bgBag = _bgBag.filter(i => i !== idx);
}

function _nextFromPool() {
  const idx = getRandomBgIndex();
  currentBgIdx = idx;
  recordBgSeen(idx);
  loadBackground(idx);
}

function nextBackground() {
  _nextFromPool();
}

// Pick a smart-random background on page load
(function initBackground() {
  currentBgIdx = getRandomBgIndex();
  recordBgSeen(currentBgIdx);
  loadBackground(currentBgIdx);
})();

const TRANSLATION_CACHE_KEY = 'ataraxia_translations_v3';
const TRANSLATION_CACHE_KEY_LEGACY = 'stoicflow_translations';

const LANG_PREF_KEY = 'ataraxia_lang';
const LANG_PREF_KEY_LEGACY = 'stoicflow_lang';
const TRANSLATION_CACHE_MAX = 500;

// currentLang and _cachedUIStrings are declared early in the STATE section
let translationCache = {};

function cleanTranslation(str) {
  if (typeof str !== 'string' || !str) return str;
  let out = str.replace(/<g[^>]*>([\s\S]*?)<\/g>/gi, '$1');
  out = out.replace(/<[^>]+>/g, '');
  out = out
    .replace(/&apos;/gi, "'")
    .replace(/&quot;/gi, '"')
    .replace(/&amp;/gi, '&')
    .replace(/&lt;/gi, '<')
    .replace(/&gt;/gi, '>')
    .replace(/&#(\d+);/g, (_, n) => String.fromCharCode(Number(n)))
    .replace(/&#x([0-9a-f]+);/gi, (_, h) => String.fromCharCode(parseInt(h, 16)));
  out = out.replace(/^[«»‹›"'`]+|[«»‹›"'`]+$/g, '');
  out = out.replace(/[»›]{2,}/g, '');
  out = out.replace(/\s+([.,;:!?])/g, '$1');
  return out.replace(/\s+/g, ' ').trim();
}

function migrateLegacyStorage() {
  [
    [LANG_PREF_KEY_LEGACY, LANG_PREF_KEY],
    [TRANSLATION_CACHE_KEY_LEGACY, TRANSLATION_CACHE_KEY],
    [TRANSLATION_CACHE_KEY_LEGACY_V2, TRANSLATION_CACHE_KEY],
  ].forEach(([legacy, current]) => {
    try {
      const value = localStorage.getItem(legacy);
      if (value != null && localStorage.getItem(current) == null) {
        localStorage.setItem(current, value);
      }
    } catch(e) {}
  });
}

function trimTranslationCache() {
  const keys = Object.keys(translationCache);
  if (keys.length <= TRANSLATION_CACHE_MAX) return;
  keys.slice(0, keys.length - TRANSLATION_CACHE_MAX).forEach((k) => {
    delete translationCache[k];
  });
}

function loadTranslationCache() {
  try {
    const raw = localStorage.getItem(TRANSLATION_CACHE_KEY)
      || localStorage.getItem(TRANSLATION_CACHE_KEY_LEGACY);
    if (raw) translationCache = JSON.parse(raw);
    trimTranslationCache();
  } catch(e) { translationCache = {}; }
}

function saveTranslationCache() {
  try {
    trimTranslationCache();
    localStorage.setItem(TRANSLATION_CACHE_KEY, JSON.stringify(translationCache));
  } catch(e) {}
}

function getCacheKey(text, targetLang) {
  return `en|${targetLang}|${text}`;
}

function getCachedTranslation(text, targetLang) {
  const raw = translationCache[getCacheKey(text, targetLang)];
  return raw ? cleanTranslation(raw) : null;
}

function setCachedTranslation(text, targetLang, translated) {
  translationCache[getCacheKey(text, targetLang)] = cleanTranslation(translated);
  trimTranslationCache();
}

function _gtLang(lang) {
  const map = { zh: 'zh-CN', 'zh-tw': 'zh-TW', he: 'iw', 'iu-latn': 'iu-Latn' };
  return map[lang] || lang;
}

async function translateText(text, targetLang) {
  if (targetLang === 'en') return text;
  if (!text || !text.trim()) return text;

  const cached = getCachedTranslation(text, targetLang);
  if (cached) return cached;

  const encoded = encodeURIComponent(text);

  // Provider 1: MyMemory
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encoded}&langpair=en|${targetLang}`;
    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {
        const translated = cleanTranslation(data.responseData.translatedText);
        if (translated !== text.toUpperCase()) {
          setCachedTranslation(text, targetLang, translated);
          return translated;
        }
      }
    }
  } catch(e) {}

  // Provider 2: Google Translate (unofficial web endpoint)
  try {
    const tl = _gtLang(targetLang);
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${tl}&dt=t&q=${encoded}`;
    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      const translated = cleanTranslation(data?.[0]?.map(s => s?.[0]).filter(Boolean).join(''));
      if (translated) {
        setCachedTranslation(text, targetLang, translated);
        return translated;
      }
    }
  } catch(e) {}

  // Provider 3: LibreTranslate
  try {
    const resp = await fetch('https://libretranslate.com/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q: text, source: 'en', target: targetLang, format: 'text' }),
    });
    if (resp.ok) {
      const data = await resp.json();
      if (data.translatedText) {
        const translated = cleanTranslation(data.translatedText);
        setCachedTranslation(text, targetLang, translated);
        return translated;
      }
    }
  } catch(e) {}

  return text;
}

async function batchTranslate(texts, targetLang) {
  if (targetLang === 'en') return [...texts];

  const results = new Array(texts.length);
  const uncached = [];

  for (let i = 0; i < texts.length; i++) {
    const cached = getCachedTranslation(texts[i], targetLang);
    if (cached) {
      results[i] = cached;
    } else {
      uncached.push(i);
    }
  }

  const CONCURRENCY = 3;
  for (let start = 0; start < uncached.length; start += CONCURRENCY) {
    const batch = uncached.slice(start, start + CONCURRENCY);
    const promises = batch.map(idx => translateText(texts[idx], targetLang).then(t => { results[idx] = t; }));
    await Promise.all(promises);
  }

  saveTranslationCache();
  return results;
}

async function switchLanguage(langCode, { radarMode = langCode, persist = true } = {}) {
  if (langCode === 'original') langCode = 'en';
  currentLang = langCode;
  if (persist) {
    localStorage.setItem(LANG_PREF_KEY, langCode);
    window.RadarLanguageMenu?.persistMode(radarMode === 'en' ? 'en' : radarMode);
  }

  const langData = SUPPORTED_LANGS.find(l => l.code === langCode);
  const sharedData = window._radarLanguageMenu?.getModes?.()[radarMode];
  if (!window._radarLanguageMenu) {
    document.getElementById('lang-label').textContent = sharedData?.label || (langData ? langData.native : langCode.toUpperCase());
  }
  document.documentElement.lang = langCode === 'zh-tw' ? 'zh-Hant' : (langCode === 'zh' ? 'zh-Hans' : langCode);

  document.querySelectorAll('.lang-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === langCode);
  });

  window._radarLanguageMenu?.setActive(radarMode);
  document.getElementById('lang-dropdown').classList.remove('open');
  document.getElementById('lang-dropdown').hidden = true;

  if (langCode === 'en') {
    applyUIStrings(SOL_UI_EN);
    setLanguageStatus('');
    return;
  }

  setLanguageStatus('Translating…');

  try {
    await translateUIStrings(langCode);

  setLanguageStatus('');
}

  if (window.RadarLanguageMenu) {

    const legacySaved = localStorage.getItem(LANG_PREF_KEY)
      || localStorage.getItem(LANG_PREF_KEY_LEGACY);
    const initialMode = window.RadarLanguageMenu.normalizeMode(
      radarSaved || legacySaved || window.RadarLanguageMenu.preferredMode('original'),
    ) || 'original';
    window._radarLanguageMenu = window.RadarLanguageMenu.mount({
      button: '#lang-btn',
      menu: '#lang-dropdown',
      label: '#lang-label',
      initialMode,
      nativeLocale: 'en',
      anchor: '.game-toolbar',
      onSelect: (mode) => switchLanguage(mode === 'original' ? 'en' : mode, { radarMode: mode }),
    });
    const initialLang = initialMode === 'original' ? 'en' : initialMode;
    if (initialLang !== 'en') {
      switchLanguage(initialLang, { radarMode: initialMode, persist: false });
    } else {
      applyUIStrings(SOL_UI_EN);
      window._radarLanguageMenu?.setActive(initialMode);
    }
    return;

  buildLangDropdown();

  const langBtn = document.getElementById('lang-btn');
  const dropdown = document.getElementById('lang-dropdown');
  langBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const open = dropdown.classList.toggle('open');
    dropdown.hidden = !open;
  });

    if (!dropdown.contains(e.target) && e.target !== langBtn) {
      dropdown.classList.remove('open');
      dropdown.hidden = true;
    }
  });

  const saved = localStorage.getItem(LANG_PREF_KEY)
    || localStorage.getItem(LANG_PREF_KEY_LEGACY);
  if (saved && saved !== 'en') {
    switchLanguage(saved);
  } else if (!saved) {
    const browserLang = (navigator.language || 'en').split('-')[0].toLowerCase();
    if (browserLang !== 'en' && SUPPORTED_LANGS.some(l => l.code === browserLang)) {
      switchLanguage(browserLang);
    }
  }
}

function cardLabel(c) {
  return c ? `${c.value}${c.suit}` : '?';
}

/** Collect all productive / legal moves, best first (score desc). */
function collectHintMoves() {
  const moves = [];
  const push = (m, score) => { if (m) moves.push({ ...m, score }); };

  // 1. Foundations (highest value)
  if (waste.length > 0) {
    const card = waste[waste.length - 1];
    for (let fi = 0; fi < 4; fi++) {
      if (canDropOnFoundation(card, fi)) {
        push({ fromPile: 'waste', fromCol: null, cardIdx: waste.length - 1, toPile: 'foundation', toCol: fi, card }, 100 + numVal(card.value));
      }
    }
  }
  for (let col = 0; col < 7; col++) {
    const pile = tableau[col];
    if (!pile.length) continue;
    const card = pile[pile.length - 1];
    if (!card.faceUp) continue;
    for (let fi = 0; fi < 4; fi++) {
      if (canDropOnFoundation(card, fi)) {
        push({ fromPile: 'tableau', fromCol: col, cardIdx: pile.length - 1, toPile: 'foundation', toCol: fi, card }, 100 + numVal(card.value));
      }
    }
  }

  // 2. Uncover face-down cards (very useful)
  for (let col = 0; col < 7; col++) {
    const pile = tableau[col];
    for (let ci = 0; ci < pile.length; ci++) {
      if (!pile[ci].faceUp) continue;
      if (!(ci > 0 && !pile[ci - 1].faceUp)) continue;
      const card = pile[ci];
      for (let tc = 0; tc < 7; tc++) {
        if (tc === col) continue;
        if (canDropOnTableau(card, tc)) {
          push({ fromPile: 'tableau', fromCol: col, cardIdx: ci, toPile: 'tableau', toCol: tc, card }, 80 + (pile.length - ci));
        }
      }
    }
  }

  // 3. Waste → tableau
  if (waste.length > 0) {
    const card = waste[waste.length - 1];
    for (let tc = 0; tc < 7; tc++) {
      if (canDropOnTableau(card, tc)) {
        const empty = tableau[tc].length === 0;
        if (empty && card.value !== 'K') continue;
        push({ fromPile: 'waste', fromCol: null, cardIdx: waste.length - 1, toPile: 'tableau', toCol: tc, card }, empty ? 55 : 70);
      }
    }
  }

  // 4. Tableau → tableau (build / free space), avoid pointless king shuffle
  for (let col = 0; col < 7; col++) {
    const pile = tableau[col];
    for (let ci = 0; ci < pile.length; ci++) {
      if (!pile[ci].faceUp) continue;
      if (ci > 0 && !pile[ci - 1].faceUp) continue; // already handled as uncover
      const card = pile[ci];
      for (let tc = 0; tc < 7; tc++) {
        if (tc === col) continue;
        if (!canDropOnTableau(card, tc)) continue;
        if (card.value === 'K' && tableau[tc].length === 0 && ci === 0) continue;
        const empties = tableau.filter((p) => p.length === 0).length;
        push({ fromPile: 'tableau', fromCol: col, cardIdx: ci, toPile: 'tableau', toCol: tc, card }, 40 + (empties > 0 ? 5 : 0));
      }
    }
  }

  // 5. King → empty (only if uncovers)
  for (let col = 0; col < 7; col++) {
    const pile = tableau[col];
    for (let ci = 0; ci < pile.length; ci++) {
      if (!pile[ci].faceUp || pile[ci].value !== 'K') continue;
      const uncovers = ci > 0 && !pile[ci - 1].faceUp;
      if (!uncovers) continue;
      for (let tc = 0; tc < 7; tc++) {
        if (tc === col || tableau[tc].length > 0) continue;
        push({ fromPile: 'tableau', fromCol: col, cardIdx: ci, toPile: 'tableau', toCol: tc, card: pile[ci] }, 75);
      }
    }
  }
  if (waste.length > 0 && waste[waste.length - 1].value === 'K') {
    for (let tc = 0; tc < 7; tc++) {
      if (tableau[tc].length === 0) {
        push({ fromPile: 'waste', fromCol: null, cardIdx: waste.length - 1, toPile: 'tableau', toCol: tc, card: waste[waste.length - 1] }, 60);
      }
    }
  }

  // 6. Draw / recycle
  if (stock.length > 0) {
    push({ fromPile: 'stock', fromCol: null, cardIdx: null, toPile: null, toCol: null }, 25);
  } else if (waste.length > 0) {
    // recycle only if something in waste (eventually) is playable after draws
    let useful = false;
    for (const wc of waste) {
      for (let fi = 0; fi < 4; fi++) if (canDropOnFoundation(wc, fi)) useful = true;
      for (let tc = 0; tc < 7; tc++) if (canDropOnTableau(wc, tc)) useful = true;
    }
    if (useful) push({ fromPile: 'recycle', fromCol: null, cardIdx: null, toPile: null, toCol: null }, 20);
  }

  moves.sort((a, b) => b.score - a.score);
  // Dedupe identical moves
  const seen = new Set();
  return moves.filter((m) => {
    const key = [m.fromPile, m.fromCol, m.cardIdx, m.toPile, m.toCol].join('|');
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function findBestMove() {
  const all = collectHintMoves();
  return all[0] || null;
}

function describeHintMove(move) {
  const fr = currentLang === 'fr';
  if (!move) return fr ? 'Aucun coup utile' : 'No useful move';
  if (move.fromPile === 'stock') {
    return fr ? 'Pioche une carte (talon)' : 'Draw a card from the stock';
  }
  if (move.fromPile === 'recycle') {
    return fr ? 'Recycle le talon (↩)' : 'Recycle the waste into stock';
  }
  const who = cardLabel(move.card);
  if (move.toPile === 'foundation') {
    return fr ? `Place ${who} sur la fondation` : `Move ${who} to a foundation`;
  }
  if (move.toPile === 'tableau') {
    const dest = tableau[move.toCol];
    if (!dest || dest.length === 0) {
      return fr ? `Place le ${who} sur une colonne vide` : `Move ${who} to an empty column`;
    }
    const top = dest[dest.length - 1];
    return fr
      ? `Place ${who} sur ${cardLabel(top)}`
      : `Move ${who} onto ${cardLabel(top)}`;
  }
  return fr ? 'Essaie ce coup' : 'Try this move';
}

function showHintToast(msg) {
  const toast = document.getElementById('hint-toast');
  if (!toast) return;
  if (hintToastTimer) { clearTimeout(hintToastTimer); hintToastTimer = null; }
  toast.textContent = msg;
  toast.classList.add('visible');
  hintToastTimer = setTimeout(() => {
    toast.classList.remove('visible');
    hintToastTimer = null;
  }, 3200);
}

function clearHint() {
  if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
  document.querySelectorAll('.card--hint, .slot--hint').forEach(el => {
    el.classList.remove('card--hint', 'slot--hint');
  });
}

function showStuckNotification() {
  const toast = document.getElementById('no-moves-toast');
  if (!toast) return;
  if (noMovesToastTimer) { clearTimeout(noMovesToastTimer); noMovesToastTimer = null; }
  const strings = (_cachedUIStrings && _cachedUIStrings[currentLang]) || SOL_UI_EN;
  stuckCount++;
  let msg = strings.noMoves || SOL_UI_EN.noMoves;
  if (stuckCount >= 2) {
    msg = (strings.noMoves || SOL_UI_EN.noMoves) +
      ' · ' + (strings.restartDeal || SOL_UI_EN.restartDeal) +
      ' / ' + (strings.newGame || SOL_UI_EN.newGame);
  }
  toast.textContent = msg;
  toast.classList.add('visible');
  noMovesToastTimer = setTimeout(() => {
    toast.classList.remove('visible');
    noMovesToastTimer = null;
  }, 4200);
}

function showHint() {
  clearHint();
  const all = collectHintMoves();
  if (!all.length) {
    showStuckNotification();
    showHintToast(currentLang === 'fr' ? 'Aucun coup utile pour l’instant' : 'No useful move right now');
    return;
  }

  // Cycle through ranked hints on repeated clicks
  if (hintCycleIdx >= all.length) hintCycleIdx = 0;
  const move = all[hintCycleIdx++];
  stuckCount = 0;

  showHintToast(describeHintMove(move));

  // Highlight stock (draw) or recycle
  if (move.fromPile === 'stock' || move.fromPile === 'recycle') {
    const sw = document.querySelector('.stock-wrapper');
    if (sw) {
      sw.classList.add('card--hint', 'slot--hint');
      hintTimer = setTimeout(clearHint, 3500);
    }
    return;
  }

  // Highlight source card
  let sourceEl = null;
  if (move.fromPile === 'waste') {
    const wasteWrapper = document.querySelector('[aria-label^="Waste"]');
    if (wasteWrapper) {
      const cards = wasteWrapper.querySelectorAll('.card');
      if (cards.length) sourceEl = cards[cards.length - 1];
    }
  } else if (move.fromPile === 'tableau') {
    const cols = document.querySelectorAll('.tableau-pile');
    if (cols[move.fromCol]) {
      const cards = cols[move.fromCol].querySelectorAll('.card');
      if (cards.length) {
        const pileArr = tableau[move.fromCol];
        const offsetFromTop = pileArr.length - 1 - move.cardIdx;
        const targetIdx = cards.length - 1 - offsetFromTop;
        sourceEl = cards[Math.max(0, targetIdx)] || cards[cards.length - 1];
      }
    }
  }
  if (sourceEl) sourceEl.classList.add('card--hint');

  // Highlight destination — top face card or empty slot
  function highlightDest(wrapper) {
    if (!wrapper) return;
    const faces = wrapper.querySelectorAll('.card--face');
    const topCard = faces.length ? faces[faces.length - 1] : null;
    const slot    = wrapper.querySelector('.card-slot');
    if (topCard) topCard.classList.add('slot--hint');
    else if (slot) slot.classList.add('slot--hint');
  }

  if (move.toPile === 'foundation') {
    const fw = document.querySelectorAll('#game-board .top-row .foundation-wrapper');
    highlightDest(fw[move.toCol]);
  } else if (move.toPile === 'tableau') {
    const cols = document.querySelectorAll('.tableau-pile');
    highlightDest(cols[move.toCol]);
  }

  // Scroll source into view on small screens
  try { sourceEl?.scrollIntoView?.({ block: 'nearest', behavior: 'smooth' }); } catch (_) {}

  hintTimer = setTimeout(clearHint, 4000);
}

/* ══════════════════════════════════════════════════════════
   AUTO-COMPLETE — play all remaining cards to foundations
   ══════════════════════════════════════════════════════════ */
function canAutoComplete() {
  // Auto-complete is available when:
  //   • stock is empty (no hidden cards remain in the draw pile)
  //   • every card in the tableau is face-up (no hidden cards there either)
  // Waste cards are already face-up so they don't block completion.
  if (stock.length > 0) return false;
  for (let col = 0; col < 7; col++) {
    if (tableau[col].some(c => !c.faceUp)) return false;
  }
  return foundations.some(f => f.length < 13); // not already won
}

function updateAutoCompleteUI() {
  const banner = document.getElementById('autocomplete-banner');
  if (banner) {
    if (canAutoComplete()) {
      banner.classList.remove('hidden');
    } else {
      banner.classList.add('hidden');
    }
  }
}

function autoComplete() {
  if (!canAutoComplete()) return;
  document.getElementById('autocomplete-banner').classList.add('hidden');

  // Safety ceiling: prevents looping in degenerate states.
  // With 52 cards, worst case is ~10 full waste recycles (each ≤52 draws)
  // plus one move per card to a foundation (52) = well under 600 total steps.
  let budget = 500;

  function stepMove() {
    if (--budget < 0) return; // absolute safety net

    // 1. Waste → foundation
    if (waste.length > 0) {
      const wCard = waste[waste.length - 1];
      for (let fi = 0; fi < 4; fi++) {
        if (canDropOnFoundation(wCard, fi)) {
          saveHistory();
          moveCount++;
          waste.pop();
          foundations[fi].push(wCard);
          updateStats();
          render();
          if (foundations.every(f => f.length === 13)) { showWin(); return; }
          setTimeout(stepMove, 80);
          return;
        }
      }
    }

    // 2. Tableau → foundation
    for (let col = 0; col < 7; col++) {
      const pile = tableau[col];
      if (!pile.length) continue;
      const card = pile[pile.length - 1];
      if (!card.faceUp) continue;
      for (let fi = 0; fi < 4; fi++) {
        if (canDropOnFoundation(card, fi)) {
          saveHistory();
          moveCount++;
          pile.pop();
          foundations[fi].push(card);
          updateStats();
          render();
          if (foundations.every(f => f.length === 13)) { showWin(); return; }
          setTimeout(stepMove, 80);
          return;
        }
      }
    }

    // 3. Waste → tableau (unblock: the waste top can't reach a foundation yet)
    if (waste.length > 0) {
      const wCard = waste[waste.length - 1];
      for (let tc = 0; tc < 7; tc++) {
        if (canDropOnTableau(wCard, tc)) {
          saveHistory();
          moveCount++;
          waste.pop();
          tableau[tc].push(wCard);
          updateStats();
          render();
          setTimeout(stepMove, 80);
          return;
        }
      }
    }

    // 4. Draw one card from stock (populated by the recycle step below)
    if (stock.length > 0) {
      const c = stock.pop();
      c.faceUp = true;
      waste.push(c);
      moveCount++;
      updateStats();
      render();
      setTimeout(stepMove, 80);
      return;
    }

    // 5. Recycle waste into stock so we can reach buried waste cards.
    //    This is only reached when stock is empty and waste has cards that
    //    couldn't be played by steps 1–3 (top waste card is unplayable).
    if (waste.length > 0) {
      stock = [...waste].reverse().map(c => ({ ...c, faceUp: false }));
      waste = [];
      moveCount++;
      updateStats();
      render();
      setTimeout(stepMove, 80);
      return;
    }
    // Nothing left to do — stop.
  }
  stepMove();
}

/* ══════════════════════════════════════════════════════════
   GAME STATISTICS — persist win/loss record
   ══════════════════════════════════════════════════════════ */
const STATS_KEY = 'ataraxia_sol_stats';

function loadGameStats() {
  try {
    const data = JSON.parse(localStorage.getItem(STATS_KEY) || '{}');
    gamesPlayed = data.gamesPlayed || 0;
    gamesWon    = data.gamesWon    || 0;
    winStreak   = data.winStreak   || 0;
    bestTime    = data.bestTime    || Infinity;
  } catch(e) {}
}

function saveGameStats() {
  try {
    localStorage.setItem(STATS_KEY, JSON.stringify({ gamesPlayed, gamesWon, winStreak, bestTime }));
  } catch(e) {}
}

// Shared helper — call once per completed game (win or loss)
function recordGameResult(won) {
  gamesPlayed++;
  if (won) {
    gamesWon++;
    winStreak++;
  } else {
    winStreak = 0;
  }
  saveGameStats();
}

function updateWinStats() {
  const playedEl = document.getElementById('stat-win-played');
  const wonEl    = document.getElementById('stat-win-won');
  const streakEl = document.getElementById('stat-win-streak');
  const bestEl   = document.getElementById('stat-win-best');
  if (playedEl) playedEl.textContent = gamesPlayed;
  if (wonEl)    wonEl.textContent    = gamesWon;
  if (streakEl) streakEl.textContent = winStreak;
  if (bestEl)   bestEl.textContent   = bestTime < Infinity ? formatTime(bestTime) : '—';
}

/* ══════════════════════════════════════════════════════════
   HI-SCORES — arcade / NES style (3 initials), local only
   Rank: faster time first, then fewer moves.
   ══════════════════════════════════════════════════════════ */
const HI_SCORE_KEY = 'le_radar_sol_hiscores_v1';
const HI_SCORE_MAX = 5;
const HI_INITIALS_LEN = 3; // classic arcade / NES high-score initials
const HI_ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const HI_DEFAULT_NAME = 'AAA';

let hiScores = [];
let hiLetters = [0, 0, 0]; // alphabet indices
let hiHighlightName = null;

function loadHiScores() {
  try {
    const raw = JSON.parse(localStorage.getItem(HI_SCORE_KEY) || '[]');
    if (!Array.isArray(raw)) { hiScores = []; return; }
    hiScores = raw
      .filter((e) => e && typeof e.name === 'string' && Number.isFinite(e.timeMs))
      .map((e) => ({
        name: String(e.name).toUpperCase().replace(/[^A-Z]/g, '').slice(0, HI_INITIALS_LEN).padEnd(HI_INITIALS_LEN, 'A'),
        timeMs: Math.max(0, Math.round(e.timeMs)),
        moves: Number.isFinite(e.moves) ? Math.max(0, Math.round(e.moves)) : 0,
        at: e.at || 0,
      }));
    sortHiScores();
  } catch {
    hiScores = [];
  }
}

function sortHiScores() {
  hiScores.sort((a, b) => {
    if (a.timeMs !== b.timeMs) return a.timeMs - b.timeMs;
    if (a.moves !== b.moves) return a.moves - b.moves;
    return (a.at || 0) - (b.at || 0);
  });
  if (hiScores.length > HI_SCORE_MAX) hiScores.length = HI_SCORE_MAX;
}

function saveHiScores() {
  try {
    localStorage.setItem(HI_SCORE_KEY, JSON.stringify(hiScores));
  } catch { /* quota */ }
}

function qualifiesHiScore(timeMs, moves) {
  if (!Number.isFinite(timeMs) || timeMs <= 0) return false;
  if (hiScores.length < HI_SCORE_MAX) return true;
  const last = hiScores[hiScores.length - 1];
  if (timeMs < last.timeMs) return true;
  if (timeMs === last.timeMs && moves < last.moves) return true;
  return false;
}

function insertHiScore(entry) {
  hiScores.push(entry);
  sortHiScores();
  saveHiScores();
}

function renderHiScoreList(highlightName) {
  const list = document.getElementById('hi-score-list');
  const empty = document.getElementById('hi-score-empty');
  if (!list) return;
  list.innerHTML = '';
  if (!hiScores.length) {
    empty?.classList.remove('hidden');
    return;
  }
  empty?.classList.add('hidden');
  hiScores.forEach((e, i) => {
    const li = document.createElement('li');
    if (highlightName && e.name === highlightName && i === hiScores.findIndex((x) => x.name === highlightName && x.timeMs === e.timeMs && x.moves === e.moves)) {
      li.classList.add('is-new');
    }
    li.innerHTML =
      `<span class="hi-rank">${i + 1}.</span>` +
      `<span class="hi-name">${e.name}</span>` +
      `<span class="hi-time">${formatTime(e.timeMs)}</span>` +
      `<span class="hi-moves">${e.moves}mv</span>`;
    list.appendChild(li);
  });
}

function syncHiLetterButtons() {
  document.querySelectorAll('#hi-score-letters .hi-letter').forEach((btn) => {
    const i = Number(btn.dataset.i);
    btn.textContent = HI_ALPHABET[hiLetters[i]] || 'A';
  });
}

function bumpHiLetter(index, dir) {
  const n = HI_ALPHABET.length;
  hiLetters[index] = (hiLetters[index] + dir + n) % n;
  syncHiLetterButtons();
}

function currentHiName() {
  return hiLetters.map((i) => HI_ALPHABET[i] || 'A').join('').slice(0, HI_INITIALS_LEN);
}

function setHiScoreBtnExpanded(open) {
  document.getElementById('hi-score-btn')?.setAttribute('aria-expanded', open ? 'true' : 'false');
}

function showHiScorePanel({ entryMode = false, pending = null } = {}) {
  const panel = document.getElementById('hi-score-panel');
  const backdrop = document.getElementById('hi-score-backdrop');
  const entry = document.getElementById('hi-score-entry');
  if (!panel) return;
  renderHiScoreList(hiHighlightName);
  if (entryMode && pending) {
    hiEntryPending = pending;
    // Prefer last used initials if any
    const last = hiScores[0]?.name || HI_DEFAULT_NAME;
    hiLetters = last.split('').slice(0, HI_INITIALS_LEN).map((ch) => {
      const idx = HI_ALPHABET.indexOf(ch);
      return idx >= 0 ? idx : 0;
    });
    while (hiLetters.length < HI_INITIALS_LEN) hiLetters.push(0);
    syncHiLetterButtons();
    entry?.classList.remove('hidden');
  } else {
    hiEntryPending = null;
    entry?.classList.add('hidden');
  }
  setHiScoreBtnExpanded(true);
  backdrop?.classList.remove('hidden');
  panel.classList.remove('hidden');
}

function hideHiScorePanel() {
  document.getElementById('hi-score-panel')?.classList.add('hidden');
  document.getElementById('hi-score-backdrop')?.classList.add('hidden');
  document.getElementById('hi-score-entry')?.classList.add('hidden');
  hiEntryPending = null;
  setHiScoreBtnExpanded(false);
}

function offerHiScore({ timeMs, moves }) {
  loadHiScores();
  // Saisie des initiales uniquement si record ; pas d’auto-ouverture du classement
  if (qualifiesHiScore(timeMs, moves)) {
    showHiScorePanel({ entryMode: true, pending: { timeMs, moves } });
  }
}

function confirmHiScoreEntry() {
  if (!hiEntryPending) {
    hideHiScorePanel();
    return;
  }
  const name = currentHiName() || HI_DEFAULT_NAME;
  insertHiScore({
    name,
    timeMs: hiEntryPending.timeMs,
    moves: hiEntryPending.moves,
    at: Date.now(),
  });
  hiHighlightName = name;
  hiEntryPending = null;
  document.getElementById('hi-score-entry')?.classList.add('hidden');
  // Keep panel open (centered) so the new rank is visible
  renderHiScoreList(hiHighlightName);
}

function initHiScoreUI() {
  loadHiScores();
  const panel = document.getElementById('hi-score-panel');
  const backdrop = document.getElementById('hi-score-backdrop');
  const btn = document.getElementById('hi-score-btn');
  panel?.addEventListener('click', (e) => e.stopPropagation());
  panel?.addEventListener('pointerdown', (e) => e.stopPropagation());

  btn?.addEventListener('click', (e) => {
    e.stopPropagation();
    // Toggle when browsing (not during initial entry)
    if (panel && !panel.classList.contains('hidden') && !hiEntryPending) {
      hideHiScorePanel();
      return;
    }
    loadHiScores();
    showHiScorePanel({ entryMode: false });
  });
  document.getElementById('hi-score-close')?.addEventListener('click', hideHiScorePanel);
  document.getElementById('hi-score-ok')?.addEventListener('click', confirmHiScoreEntry);
  // Clic sur le fond sombre = fermer (sauf pendant la saisie d’initiales)
  backdrop?.addEventListener('click', () => {
    if (!hiEntryPending) hideHiScorePanel();
  });

  document.getElementById('hi-score-letters')?.addEventListener('click', (e) => {
    const spin = e.target.closest('.hi-letter-spin');
    if (spin) {
      bumpHiLetter(Number(spin.dataset.i), Number(spin.dataset.dir) || 1);
      return;
    }
    const letter = e.target.closest('.hi-letter');
    if (letter) bumpHiLetter(Number(letter.dataset.i), 1);
  });

  // Keyboard: Escape always closes; ← → / ↑ ↓ / Enter only in entry mode
  document.addEventListener('keydown', (e) => {
    if (!panel || panel.classList.contains('hidden')) return;
    if (e.key === 'Escape') {
      e.preventDefault();
      hideHiScorePanel();
      return;
    }
    const entry = document.getElementById('hi-score-entry');
    if (!entry || entry.classList.contains('hidden')) return;
    if (e.key === 'Enter') {
      e.preventDefault();
      confirmHiScoreEntry();
      return;
    }
    const active = document.activeElement;
    const idx = active?.classList?.contains('hi-letter')
      ? Number(active.dataset.i)
      : 0;
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      bumpHiLetter(idx, 1);
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      bumpHiLetter(idx, -1);
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      const next = Math.max(0, idx - 1);
      document.querySelector(`.hi-letter[data-i="${next}"]`)?.focus();
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      const next = Math.min(HI_INITIALS_LEN - 1, idx + 1);
      document.querySelector(`.hi-letter[data-i="${next}"]`)?.focus();
    }
  });
}

loadGameStats();
initHiScoreUI();
</script>
